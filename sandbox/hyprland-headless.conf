# ── Sandbox Hyprland Config (nested Wayland mode) ─────────────────────────
# Runs Hyprland as a nested compositor inside the host's session.
# GPU rendering is shared via nvidia-container-toolkit.
#
# This config stands alone — it does NOT source the full hyprland.conf
# because plugins (split-monitor-workspaces, hyprexpo) aren't available
# in the container. Individual config sections are sourced selectively.

# ── Monitor ──────────────────────────────────────────────────────────────
# The Wayland backend creates a window on the host compositor
monitor = , 2560x1440@60, 0x0, 1
workspace = 1, default:true

# ── Environment (from real config) ──────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# ── Appearance (Snazzy palette) ─────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(57c7ffee) rgba(ff6ac1ee) 45deg
    col.inactive_border = rgba(1a1a1aaa)
    layout = master
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        color = rgba(57c7ff33)
    }
}

animations {
    enabled = true
}

master {
    new_status = slave
    mfact = 0.5
}

# ── Disable XWayland ────────────────────────────────────────────────────
xwayland {
    enabled = false
}

# ── Keyboard ────────────────────────────────────────────────────────────
input {
    kb_layout = us
}
