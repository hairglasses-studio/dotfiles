# ── Cyberpunk Hyprland config ─────────────────────
# Ported from Sway with animations enabled
# To switch: ln -sf dotfiles/hyprland/hyprland.conf ~/.config/hypr/hyprland.conf

# ── Monitor ───────────────────────────────────────
# Configure per-machine in ~/.config/hypr/monitors.conf
source = ~/.config/hypr/monitors.conf

# ── Environment ──────────────────────────────────
env = XCURSOR_THEME,phinger-cursors-light
env = XCURSOR_SIZE,24

# ── Variables ─────────────────────────────────────
$mod = SUPER
$term = ghostty
$menu = wofi --show drun

# ── Input ─────────────────────────────────────────
input {
    kb_layout = us
    repeat_rate = 40
    repeat_delay = 250
    follow_mouse = 1
    sensitivity = -0.5
    scroll_factor = 0.25
}

# ── Appearance ────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(57c7ffee) rgba(ff6ac1ee) 45deg
    col.inactive_border = rgba(686868aa)
    layout = dwindle
    resize_on_border = true
}

# ── Cyberpunk animations ─────────────────────────
animations {
    enabled = true
    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    bezier = neon, 0.16, 1, 0.3, 1
    bezier = glitch, 0.68, -0.55, 0.27, 1.55

    animation = windows, 1, 5, cyberpunk, slide
    animation = windowsIn, 1, 5, neon, slide
    animation = windowsOut, 1, 4, cyberpunk, popin 80%
    animation = windowsMove, 1, 4, neon
    animation = border, 1, 8, neon
    animation = borderangle, 1, 60, neon, loop
    animation = fade, 1, 5, cyberpunk
    animation = fadeIn, 1, 4, neon
    animation = fadeOut, 1, 4, cyberpunk
    animation = workspaces, 1, 5, neon, slidevert
    animation = specialWorkspace, 1, 5, glitch, slidefadevert -50%
}

# ── Decoration ────────────────────────────────────
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(57c7ff33)
        color_inactive = rgba(00000066)
    }
}

# ── Layout ────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# ── Keybinds: Launch ─────────────────────────────
bind = $mod, Return, exec, $term
bind = $mod, D, exec, $menu
bind = $mod, grave, exec, ghostty --class=quick-terminal

# ── Keybinds: Navigation (hjkl + arrows) ────────
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u

# ── Keybinds: Move windows (hjkl + arrows) ──────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u

# ── Keybinds: Layout ────────────────────────────
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, cyclenext
bind = $mod, A, focusurgentorlast
bind = $mod, backslash, togglesplit
bind = $mod, minus, pseudo

# ── Keybinds: Workspaces ────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Keybinds: Window management ──────────────────
bind = $mod SHIFT, Q, killactive
bind = $mod, Tab, workspace, previous
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Tab, movecurrentworkspacetomonitor, +1

# ── Keybinds: Resize ────────────────────────────
bind = $mod SHIFT, semicolon, submap, resize
submap = resize
binde = , H, resizeactive, -50 0
binde = , J, resizeactive, 0 50
binde = , K, resizeactive, 0 -50
binde = , L, resizeactive, 50 0
bind = SHIFT, H, movewindow, l
bind = SHIFT, J, movewindow, d
bind = SHIFT, K, movewindow, u
bind = SHIFT, L, movewindow, r
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Keybinds: Shaders & Ghostty ─────────────────
bind = $mod SHIFT, S, exec, shader-random.sh
bind = $mod SHIFT, N, exec, shader-cycle.sh next
bind = $mod SHIFT, P, exec, shader-cycle.sh prev
bind = $mod, G, exec, shader-cycle.sh next
bind = $mod SHIFT, G, exec, touch ~/.config/ghostty/config

# ── Keybinds: Lock, wallpaper, dashboard ────────
bind = $mod SHIFT, X, exec, hyprlock
bind = $mod SHIFT, W, exec, shader-wallpaper.sh next
bind = $mod SHIFT CTRL, W, exec, shader-wallpaper.sh random
bind = $mod SHIFT ALT, W, exec, shader-wallpaper.sh static random
bind = $mod SHIFT, D, exec, eww open --toggle dashboard
bind = $mod SHIFT, E, exit,

# ── Mouse binds ──────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Window rules ─────────────────────────────────
windowrule = float, class:^(quick-terminal)$
windowrule = size 800 500, class:^(quick-terminal)$
windowrule = float, class:^(glslViewer)$

# ── Startup ──────────────────────────────────────
exec-once = eww daemon && eww open bar
exec-once = mako
exec-once = swww-daemon
exec-once = hypridle

# ── Layer rules (bar/notification transparency) ──
layerrule = blur, eww-bar
layerrule = ignorealpha 0.3, eww-bar
layerrule = blur, notifications

# ── Include machine-specific overrides ───────────
source = ~/.config/hypr/local.conf
