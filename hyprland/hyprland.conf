# ── Cyberpunk Hyprland config ─────────────────────

# ── Monitor ───────────────────────────────────────
source = ~/.config/hypr/monitors.conf

# ── Environment ──────────────────────────────────
# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK/Qt
env = GTK_THEME,Matcha-dark-sea
env = QT_STYLE_OVERRIDE,kvantum

# ── Variables ─────────────────────────────────────
$mod = SUPER
$term = ghostty
$menu = wofi --show drun

# ── Input ─────────────────────────────────────────
input {
    kb_layout = us
    kb_options = grp:none
    repeat_rate = 40
    repeat_delay = 250
    follow_mouse = 1
    sensitivity = -0.775
    scroll_factor = 0.079
}

# ── Appearance ────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(57c7ffee) rgba(ff6ac1ee) 45deg
    col.inactive_border = rgba(686868aa)
    layout = master
    resize_on_border = true
}

# ── Cyberpunk animations ─────────────────────────
animations {
    enabled = true

    # Custom bezier curves
    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    bezier = neon, 0.16, 1, 0.3, 1
    bezier = glitch, 0.68, -0.55, 0.27, 1.55
    bezier = slingshot, 1, -1, 0.9, 1.2
    bezier = snappy, 0.4, 0.0, 0.2, 1.0

    # Windows — bouncy open, snappy close
    animation = windows, 1, 5, cyberpunk, slide
    animation = windowsIn, 1, 5, neon, slide
    animation = windowsOut, 1, 3, slingshot, popin 80%
    animation = windowsMove, 1, 4, neon

    # Borders
    animation = border, 1, 8, neon
    animation = borderangle, 1, 60, neon, loop

    # Fades
    animation = fade, 1, 4, cyberpunk
    animation = fadeIn, 1, 3, neon
    animation = fadeOut, 1, 3, snappy
    animation = fadeSwitch, 1, 3, snappy
    animation = fadeShadow, 1, 4, snappy
    animation = fadeDim, 1, 4, snappy

    # Layers (bar, notifications, popups) — instant feel
    animation = fadeLayersIn, 1, 2, snappy
    animation = fadeLayersOut, 1, 2, slingshot

    # Wayland popups (tooltips, menus)
    animation = fadePopupsIn, 1, 2, snappy
    animation = fadePopupsOut, 1, 2, slingshot

    # DPMS (screen on/off)
    animation = fadeDpms, 1, 5, neon

    # Workspaces — elastic transitions
    animation = workspaces, 1, 5, cyberpunk, slidevert
    animation = specialWorkspace, 1, 4, glitch, slidefadevert -50%
}

# ── Decoration ────────────────────────────────────
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        vibrancy = 0.17
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(57c7ff33)
        color_inactive = rgba(00000066)
    }
}

# ── Layout ────────────────────────────────────────
master {
    mfact = 0.50
    new_status = master
    orientation = left
    smart_resizing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vfr = true
    mouse_move_enables_dpms = true
    focus_on_activate = true
    allow_session_lock_restore = true
}

render {
    direct_scanout = true
}

cursor {
    no_hardware_cursors = true
}

# ── Keybinds: Launch ─────────────────────────────
bindd = $mod, Return, New terminal, exec, ghostty --gtk-single-instance=false
bindd = $mod, D, App launcher, exec, $menu
bindd = $mod, grave, Keybind reference, exec, pypr toggle keybinds
bindd = $mod, P, Toggle powermenu, exec, eww open --toggle powermenu
bindd = $mod, F, Toggle fleet sidebar, exec, eww open --toggle sidebar

# ── Keybinds: Navigation ────────────────────────
bindd = $mod, H, Focus left (hjkl), movefocus, l
bindd = $mod, J, Focus down (hjkl), movefocus, d
bindd = $mod, K, Focus up (hjkl), movefocus, u
bindd = $mod, L, Focus right (hjkl), movefocus, r
bindd = $mod, left, Focus left (arrow), movefocus, l
bindd = $mod, right, Focus right (arrow), movefocus, r
bindd = $mod, down, Focus down (arrow), movefocus, d
bindd = $mod, up, Focus up (arrow), movefocus, u

# ── Keybinds: Rotary encoder ────────────────────
bindd = , F13, Encoder: focus left, movefocus, l
bindd = , F14, Encoder: focus right, movefocus, r

# ── Keybinds: Move windows ─────────────────────
bindd = $mod SHIFT, H, Move window left (hjkl), movewindow, l
bindd = $mod SHIFT, J, Move window down (hjkl), movewindow, d
bindd = $mod SHIFT, K, Move window up (hjkl), movewindow, u
bindd = $mod SHIFT, L, Move window right (hjkl), movewindow, r
bindd = $mod SHIFT, left, Move window left (arrow), movewindow, l
bindd = $mod SHIFT, right, Move window right (arrow), movewindow, r
bindd = $mod SHIFT, down, Move window down (arrow), movewindow, d
bindd = $mod SHIFT, up, Move window up (arrow), movewindow, u

# ── Keybinds: Master layout ─────────────────────
bindd = $mod, F, Fullscreen, fullscreen, 0
bindd = $mod SHIFT, space, Toggle float, togglefloating
bindd = $mod, space, Cycle focus, cyclenext
bindd = $mod, A, Focus urgent/last, focusurgentorlast
bindd = $mod, backslash, Cycle orientation, layoutmsg, orientationcycle left top
bindd = $mod, minus, Swap with master, layoutmsg, swapwithmaster
bindd = $mod SHIFT, minus, Add master, layoutmsg, addmaster
bindd = $mod CTRL, minus, Remove master, layoutmsg, removemaster
bindd = $mod, bracketright, Increase master ratio, layoutmsg, mfact +0.05
bindd = $mod, bracketleft, Decrease master ratio, layoutmsg, mfact -0.05
bindd = $mod, M, Focus master, layoutmsg, focusmaster
bindd = $mod, comma, Roll stack forward, layoutmsg, rollnext
bindd = $mod, period, Roll stack backward, layoutmsg, rollprev

# ── Keybinds: Workspaces ────────────────────────
bindd = $mod, 1, Workspace 1, split-workspace, 1
bindd = $mod, 2, Workspace 2, split-workspace, 2
bindd = $mod, 3, Workspace 3, split-workspace, 3
bindd = $mod, 4, Workspace 4, split-workspace, 4
bindd = $mod, 5, Workspace 5, split-workspace, 5
bindd = $mod, 6, Workspace 6, split-workspace, 6
bindd = $mod, 7, Workspace 7, split-workspace, 7
bindd = $mod, 8, Workspace 8, split-workspace, 8
bindd = $mod, 9, Workspace 9, split-workspace, 9
bindd = $mod SHIFT, 1, Move to workspace 1, split-movetoworkspace, 1
bindd = $mod SHIFT, 2, Move to workspace 2, split-movetoworkspace, 2
bindd = $mod SHIFT, 3, Move to workspace 3, split-movetoworkspace, 3
bindd = $mod SHIFT, 4, Move to workspace 4, split-movetoworkspace, 4
bindd = $mod SHIFT, 5, Move to workspace 5, split-movetoworkspace, 5
bindd = $mod SHIFT, 6, Move to workspace 6, split-movetoworkspace, 6
bindd = $mod SHIFT, 7, Move to workspace 7, split-movetoworkspace, 7
bindd = $mod SHIFT, 8, Move to workspace 8, split-movetoworkspace, 8
bindd = $mod SHIFT, 9, Move to workspace 9, split-movetoworkspace, 9

# ── Keybinds: Window management ──────────────────
bindd = $mod SHIFT, Q, Close window, killactive
bindd = $mod, Tab, Workspace overview, hyprexpo:expo, toggle
bindd = ALT, Tab, App switcher (wofi), exec, $HOME/hairglasses-studio/dotfiles/scripts/app-switcher.sh
bindd = $mod SHIFT, R, Reload config, exec, hyprctl reload
bindd = $mod SHIFT, Tab, Send to other monitor, split-changemonitor, next

# ── Keybinds: Resize ────────────────────────────
bindd = $mod SHIFT, semicolon, Enter resize mode, submap, resize
submap = resize
bindde = , H, Shrink width, resizeactive, -50 0
bindde = , J, Grow height, resizeactive, 0 50
bindde = , K, Shrink height, resizeactive, 0 -50
bindde = , L, Grow width, resizeactive, 50 0
bindd = SHIFT, H, Move left, movewindow, l
bindd = SHIFT, J, Move down, movewindow, d
bindd = SHIFT, K, Move up, movewindow, u
bindd = SHIFT, L, Move right, movewindow, r
bindd = , Return, Exit resize (Enter), submap, reset
bindd = , Escape, Exit resize (Esc), submap, reset
submap = reset

# ── Keybinds: Screenshots ──────────────────────
bindd = $mod, S, Screenshot full, exec, grim - | wl-copy
bindd = $mod SHIFT, S, Screenshot region, exec, grim -g "$(slurp)" - | wl-copy
bindd = $mod CTRL, S, Screenshot crop, exec, screenshot-crop.sh

# ── Keybinds: Clipboard & Color ────────────────
bindd = $mod, V, Clipboard history, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bindd = $mod SHIFT, C, Color picker, exec, hyprpicker -a

# ── Keybinds: Media ────────────────────────────
binddl = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
binddl = , XF86AudioNext, Next track, exec, playerctl next
binddl = , XF86AudioPrev, Previous track, exec, playerctl previous
binddl = , XF86AudioMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindde = , XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindde = , XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindde = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl set +5%
bindde = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-

# ── Keybinds: Night light ───────────────────────
bindd = $mod SHIFT, T, Toggle night light, exec, pkill hyprsunset || hyprsunset --temperature 3500

# ── Keybinds: Shaders & Ghostty ─────────────────
bindd = $mod SHIFT, N, Shader next (Shift+N), exec, shader-cycle.sh next
bindd = $mod SHIFT, P, Shader prev, exec, shader-cycle.sh prev
bindd = $mod, G, Shader next (G), exec, shader-cycle.sh next
bindd = $mod SHIFT, G, Shader random, exec, shader-random.sh
bindd = $mod CTRL, G, Reload Ghostty, exec, touch ~/.config/ghostty/config

# ── Keybinds: Claude Code ───────────────────────
bindd = $mod CTRL, C, Agent session picker, exec, $HOME/hairglasses-studio/dotfiles/scripts/agent-session-picker.sh

# ── Keybinds: System ────────────────────────────
bindd = $mod SHIFT, X, Lock screen, exec, hyprlock
bindd = $mod SHIFT, W, Wallpaper next, exec, shader-wallpaper.sh next
bindd = $mod SHIFT CTRL, W, Wallpaper random, exec, shader-wallpaper.sh random
bindd = $mod SHIFT ALT, W, Wallpaper static, exec, shader-wallpaper.sh static random
bindd = $mod SHIFT, D, Toggle dashboard, exec, eww open --toggle dashboard
bindd = $mod SHIFT, E, Power menu, exec, wlogout -p layer-shell

# ── Keybinds: Scratchpads ──────────────────────
bindd = $mod SHIFT, Return, Scratchpad: terminal, exec, pypr toggle term
bindd = $mod SHIFT, V, Scratchpad: volume, exec, pypr toggle volume
bindd = $mod SHIFT, F, Scratchpad: files, exec, pypr toggle files

# ── Keybinds: Mouse ──────────────────────────────
binddm = $mod, mouse:272, Move window (drag), movewindow
binddm = $mod, mouse:273, Resize window (drag), resizewindow

# ── Window rules (0.54 block syntax) ────────────

windowrule {
    name = quick-terminal
    match:class = ^(quick-terminal)$
    float = yes
    size = 800 500
}

windowrule {
    name = glslviewer
    match:class = ^(glslViewer)$
    float = yes
}

windowrule {
    name = scratchpad
    match:class = ^(scratchpad)$
    float = yes
}

windowrule {
    name = keybinds
    match:class = ^(keybinds)$
    float = yes
    size = 520 860
    move = 16 50
    pin = yes
}

windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
    size = 400 225
}

windowrule {
    name = dialogs
    match:title = ^(Open File|Save File|Confirm|About|Properties)$
    float = yes
}

windowrule {
    name = portal
    match:class = ^(xdg-desktop-portal)
    float = yes
}

windowrule {
    name = hyprbars-non-ghostty
    match:class = ^(?!com\.mitchellh\.ghostty)
    hyprbars:no_bar = true
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Groups/tabs ──────────────────────────────────
group {
    col.border_active = rgba(57c7ffee)
    col.border_inactive = rgba(686868aa)
    col.border_locked_active = rgba(ff6ac1ee)
    col.border_locked_inactive = rgba(686868aa)

    groupbar {
        font_size = 10
        font_family = JetBrainsMono Nerd Font
        text_color = rgba(f1f1f0ff)
        col.active = rgba(57c7ff33)
        col.inactive = rgba(00000066)
        col.locked_active = rgba(ff6ac133)
        col.locked_inactive = rgba(1a1a1a66)
        height = 18
        stacked = false
        render_titles = true
    }
}

# ── Special workspaces ──────────────────────────────
workspace = special:dashboard, gapsout:20, gapsin:10, border:true, rounding:true
# ── Keybinds: Special workspaces ──────────────────
bindd = $mod, O, Toggle dashboard workspace, togglespecialworkspace, dashboard
bindd = $mod SHIFT, O, Move to dashboard, movetoworkspace, special:dashboard

# ── Plugins ──────────────────────────────────────
plugin {
    borders-plus-plus {
        add_borders = 2
        col.border_1 = rgb(57c7ff)
        border_size_1 = 3
        col.border_2 = rgb(ff6ac1)
        border_size_2 = 1
        natural_rounding = 1
    }

    split-monitor-workspaces {
        count = 9
        keep_focused = 1
        enable_notifications = 0
        enable_persistent_workspaces = 1
    }

    hyprexpo {
        columns = 3
        gap_size = 8
        bg_col = rgb(000000)
        workspace_method = center current
    }

    hyprbars {
        bar_height = 22
        bar_color = rgba(1a1a1a88)
        col.text = rgba(57c7ffcc)
        bar_text_size = 11
        bar_text_font = Maple Mono NF CN
        bar_text_align = left
        bar_title_enabled = true
        bar_precedence_over_border = true
    }

    hyprfocus {
        enabled = true
        animate_floating = true
        animate_workspacechange = true
        focus_animation = flash

        flash {
            flash_opacity = 0.85
            in_bezier = neon
            in_speed = 0.3
            out_bezier = snappy
            out_speed = 0.8
        }
    }

    hyprwinwrap {
        class = desktop-bg
    }
}

# ── Startup ──────────────────────────────────────
# Plugins (must be first — registers dispatchers before keybinds are parsed)
exec-once = hyprpm reload -n

# Session environment (enables XDG portals + screen sharing)
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Core desktop services
exec-once = mako
exec-once = swww-daemon
exec-once = eww daemon && eww open bar && eww open bar-secondary
exec-once = pypr

# Clipboard + idle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --primary --watch cliphist store
exec-once = hypridle

# Visual effects
exec-once = sleep 1 && shader-wallpaper.sh random
exec-once = hyprsunset --temperature 4500

# Hardware (delayed — BT adapter + dongle need time)
exec-once = ~/dotfiles/scripts/hypr-bt-boot.sh
exec-once = sleep 10 && solaar -w hide
exec-once = sleep 12 && solaar config "MX Master 4" scroll-ratchet-torque 75 && solaar config "MX Master 4" haptic-level 60 && solaar config "MX Master 4" thumb-scroll-mode on
# gamepad: makima runs as systemd service (makima.service) with per-app Hyprland switching

# Boot diagnostics
exec-once = ~/dotfiles/scripts/hypr-boot-log.sh

# ── Layer rules (bar/notification blur) ──────────
layerrule {
    name = bar-blur
    match:namespace = ^(bar|bar-secondary)$
    blur = yes
    ignore_alpha = 0.3
}

layerrule {
    name = notif-blur
    match:namespace = ^(notifications)$
    blur = yes
    ignore_alpha = 0.3
}

# ── Include machine-specific overrides ───────────
source = ~/.config/hypr/local.conf
