# ── Cyberpunk Hyprland config ─────────────────────

# ── Monitor ───────────────────────────────────────
source = ~/.config/hypr/monitors.conf

# ── Environment ──────────────────────────────────
# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK/Qt
env = GTK_THEME,Matcha-dark-sea
env = QT_STYLE_OVERRIDE,kvantum

# ── Variables ─────────────────────────────────────
$mod = SUPER
$term = ghostty
$menu = wofi --show drun

# ── Input ─────────────────────────────────────────
input {
    kb_layout = us
    kb_options = grp:none
    repeat_rate = 40
    repeat_delay = 250
    follow_mouse = 1
    sensitivity = -0.775
    scroll_factor = 0.079
}

# ── Appearance ────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(57c7ffee) rgba(ff6ac1ee) 45deg
    col.inactive_border = rgba(686868aa)
    layout = dwindle
    resize_on_border = true
}

# ── Cyberpunk animations ─────────────────────────
animations {
    enabled = true

    # Custom bezier curves
    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    bezier = neon, 0.16, 1, 0.3, 1
    bezier = glitch, 0.68, -0.55, 0.27, 1.55
    bezier = slingshot, 1, -1, 0.9, 1.2
    bezier = snappy, 0.4, 0.0, 0.2, 1.0

    # Windows — bouncy open, snappy close
    animation = windows, 1, 5, cyberpunk, slide
    animation = windowsIn, 1, 5, neon, slide
    animation = windowsOut, 1, 3, slingshot, popin 80%
    animation = windowsMove, 1, 4, neon

    # Borders
    animation = border, 1, 8, neon
    animation = borderangle, 1, 60, neon, loop

    # Fades
    animation = fade, 1, 4, cyberpunk
    animation = fadeIn, 1, 3, neon
    animation = fadeOut, 1, 3, snappy
    animation = fadeSwitch, 1, 3, snappy
    animation = fadeShadow, 1, 4, snappy
    animation = fadeDim, 1, 4, snappy

    # Layers (bar, notifications, popups) — instant feel
    animation = fadeLayersIn, 1, 2, snappy
    animation = fadeLayersOut, 1, 2, slingshot

    # Wayland popups (tooltips, menus)
    animation = fadePopupsIn, 1, 2, snappy
    animation = fadePopupsOut, 1, 2, slingshot

    # DPMS (screen on/off)
    animation = fadeDpms, 1, 5, neon

    # Workspaces — elastic transitions
    animation = workspaces, 1, 5, cyberpunk, slidevert
    animation = specialWorkspace, 1, 4, glitch, slidefadevert -50%
}

# ── Decoration ────────────────────────────────────
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        vibrancy = 0.17
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(57c7ff33)
        color_inactive = rgba(00000066)
    }
}

# ── Layout ────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vfr = true
    mouse_move_enables_dpms = true
    focus_on_activate = true
    allow_session_lock_restore = true
}

render {
    direct_scanout = true
}

cursor {
    no_hardware_cursors = true
}

# ── Keybinds: Launch ─────────────────────────────
# Force new process even if gtk-single-instance is on
bind = $mod, Return, exec, ghostty --gtk-single-instance=false
bind = $mod, D, exec, $menu
bind = $mod, grave, exec, pypr toggle term
bind = $mod, P, exec, eww open --toggle powermenu

# ── Keybinds: Navigation (hjkl + arrows) ────────
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u

# ── Keybinds: Rotary encoder (Keychron V1 Ultra) ──
bind = , F13, movefocus, l
bind = , F14, movefocus, r

# ── Keybinds: Move windows (hjkl + arrows) ──────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u

# ── Keybinds: Layout ────────────────────────────
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, cyclenext
bind = $mod, A, focusurgentorlast
bind = $mod, backslash, togglesplit
bind = $mod, minus, pseudo

# ── Keybinds: Workspaces ────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Keybinds: Window management ──────────────────
bind = $mod SHIFT, Q, killactive
bind = $mod, Tab, workspace, previous
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Tab, movecurrentworkspacetomonitor, +1

# ── Keybinds: Resize ────────────────────────────
bind = $mod SHIFT, semicolon, submap, resize
submap = resize
binde = , H, resizeactive, -50 0
binde = , J, resizeactive, 0 50
binde = , K, resizeactive, 0 -50
binde = , L, resizeactive, 50 0
bind = SHIFT, H, movewindow, l
bind = SHIFT, J, movewindow, d
bind = SHIFT, K, movewindow, u
bind = SHIFT, L, movewindow, r
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Keybinds: Screenshots ──────────────────────
bind = $mod, S, exec, grim - | wl-copy
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod CTRL, S, exec, screenshot-crop.sh

# ── Keybinds: Clipboard & Color ────────────────
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, C, exec, hyprpicker -a

# ── Keybinds: Media ────────────────────────────
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Keybinds: Night light ───────────────────────
bind = $mod SHIFT, T, exec, pkill hyprsunset || hyprsunset --temperature 3500

# ── Keybinds: Shaders & Ghostty ─────────────────
bind = $mod SHIFT, N, exec, shader-cycle.sh next
bind = $mod SHIFT, P, exec, shader-cycle.sh prev
bind = $mod, G, exec, shader-cycle.sh next
bind = $mod SHIFT, G, exec, shader-random.sh
bind = $mod CTRL, G, exec, touch ~/.config/ghostty/config

# ── Keybinds: Lock, wallpaper, dashboard ────────
bind = $mod SHIFT, X, exec, hyprlock
bind = $mod SHIFT, W, exec, shader-wallpaper.sh next
bind = $mod SHIFT CTRL, W, exec, shader-wallpaper.sh random
bind = $mod SHIFT ALT, W, exec, shader-wallpaper.sh static random
bind = $mod SHIFT, D, exec, eww open --toggle dashboard
bind = $mod SHIFT, E, exit,

# ── Keybinds: pyprland scratchpads ──────────────
bind = $mod SHIFT, Return, exec, pypr toggle term
bind = $mod SHIFT, V, exec, pypr toggle volume
bind = $mod SHIFT, F, exec, pypr toggle files

# ── Mouse binds ──────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Window rules (0.54 block syntax) ────────────

windowrule {
    name = quick-terminal
    match:class = ^(quick-terminal)$
    float = yes
    size = 800 500
}

windowrule {
    name = glslviewer
    match:class = ^(glslViewer)$
    float = yes
}

windowrule {
    name = scratchpad
    match:class = ^(scratchpad)$
    float = yes
}

windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
    size = 400 225
}

windowrule {
    name = dialogs
    match:title = ^(Open File|Save File|Confirm|About|Properties)$
    float = yes
}

windowrule {
    name = portal
    match:class = ^(xdg-desktop-portal)
    float = yes
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Groups/tabs ──────────────────────────────────
group {
    col.border_active = rgba(57c7ffee)
    col.border_inactive = rgba(686868aa)
    col.border_locked_active = rgba(ff6ac1ee)
    col.border_locked_inactive = rgba(686868aa)

    groupbar {
        font_size = 10
        font_family = JetBrainsMono Nerd Font
        text_color = rgba(f1f1f0ff)
        col.active = rgba(57c7ff33)
        col.inactive = rgba(00000066)
        col.locked_active = rgba(ff6ac133)
        col.locked_inactive = rgba(1a1a1a66)
        height = 18
        stacked = false
        render_titles = true
    }
}

# ── Special workspaces ──────────────────────────────
workspace = special:dashboard, gapsout:20, gapsin:10, border:true, rounding:true
bind = $mod, O, togglespecialworkspace, dashboard
bind = $mod SHIFT, O, movetoworkspace, special:dashboard

# ── Plugins (install: hyprpm add https://github.com/hyprwm/hyprland-plugins) ──
plugin {
    borders-plus-plus {
        add_borders = 2
        col.border_1 = rgb(57c7ff)
        border_size_1 = 3
        col.border_2 = rgb(ff6ac1)
        border_size_2 = 1
        natural_rounding = 1
    }
}

# ── Startup ──────────────────────────────────────
# Session environment (must be first — enables XDG portals + screen sharing)
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Core desktop services
exec-once = mako
exec-once = swww-daemon
exec-once = eww daemon && eww open bar && eww open bar-secondary
exec-once = pypr

# Clipboard + idle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

# Visual effects
exec-once = sleep 1 && shader-wallpaper.sh random
exec-once = hyprsunset --temperature 4500

# Hardware (delayed — BT adapter + dongle need time)
exec-once = sleep 5 && bluetoothctl connect AC:BF:71:C8:DB:95 && bluetoothctl connect D2:8E:C5:DE:9F:C8
exec-once = sleep 10 && solaar config "MX Master 4" scroll-ratchet-torque 75 && solaar config "MX Master 4" haptic-level 60
# gamepad: makima runs as systemd service (makima.service) with per-app Hyprland switching

# Boot diagnostics
exec-once = ~/dotfiles/scripts/hypr-boot-log.sh

# ── Layer rules (bar/notification blur) ──────────
layerrule {
    name = bar-blur
    match:namespace = ^(bar|bar-secondary)$
    blur = yes
    ignore_alpha = 0.3
}

layerrule {
    name = notif-blur
    match:namespace = ^(notifications)$
    blur = yes
    ignore_alpha = 0.3
}

# ── Include machine-specific overrides ───────────
source = ~/.config/hypr/local.conf
