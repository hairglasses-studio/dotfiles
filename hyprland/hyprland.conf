# ── Cyberpunk Hyprland config ─────────────────────

# ── Monitor ───────────────────────────────────────
source = ~/.config/hypr/monitors.conf
source = ~/.local/state/hypr/monitors.dynamic.conf

# ── Environment ──────────────────────────────────
# Cursor
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct
env = GSK_RENDERER,ngl

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK comes from settings.ini/gsettings; Qt theme vars come from the login
# environment and are imported into DBus and the user systemd manager below.

# ── Variables ─────────────────────────────────────
$mod = SUPER
# GUI launchers resolve through managed user-bin shims instead of shell-only PATH.
$term = $HOME/.local/bin/kitty-shell-launch
$shaderctl = $HOME/.local/bin/kitty-shader-playlist

# ── Input ─────────────────────────────────────────
input {
    kb_layout = us
    kb_options = grp:none
    repeat_rate = 40
    repeat_delay = 250
    # Keep keyboard focus stable instead of changing it on pointer hover.
    follow_mouse = 0
    sensitivity = -0.775
    scroll_factor = 0.079
}

# ── Appearance ────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 16
    border_size = 3
    col.active_border = rgba(29f0ffee) rgba(ff47d1ee) 45deg
    col.inactive_border = rgba(46506dcc)
    layout = hy3
    resize_on_border = true
}

# ── Cyberpunk animations ─────────────────────────
animations {
    enabled = true

    # Custom bezier curves
    bezier = cyberpunk, 0.05, 0.9, 0.1, 1.05
    bezier = neon, 0.16, 1, 0.3, 1
    bezier = glitch, 0.68, -0.55, 0.27, 1.55
    bezier = slingshot, 1, -1, 0.9, 1.2
    bezier = snappy, 0.4, 0.0, 0.2, 1.0
    bezier = elastic, 0.28, 0.77, 0.20, 1.45
    bezier = spring, 0.13, 0.99, 0.29, 1.1
    bezier = bounce, 0.34, 1.56, 0.64, 1.0

    # Windows — elastic open, bounce close
    animation = windows, 1, 5, cyberpunk, slide
    animation = windowsIn, 1, 6, elastic, popin 85%
    animation = windowsOut, 1, 4, bounce, popin 75%
    animation = windowsMove, 1, 4, neon

    # Borders
    animation = border, 1, 8, neon
    animation = borderangle, 1, 60, neon, loop

    # Fades
    animation = fade, 1, 4, cyberpunk
    animation = fadeIn, 1, 3, neon
    animation = fadeOut, 1, 3, snappy
    animation = fadeSwitch, 1, 3, snappy
    animation = fadeShadow, 1, 4, snappy
    animation = fadeDim, 1, 4, snappy

    # Layers (bar, notifications, popups) — instant feel
    animation = fadeLayersIn, 1, 2, snappy
    animation = fadeLayersOut, 1, 2, slingshot

    # Wayland popups (tooltips, menus)
    animation = fadePopupsIn, 1, 2, snappy
    animation = fadePopupsOut, 1, 2, slingshot

    # DPMS (screen on/off)
    animation = fadeDpms, 1, 5, neon

    # Workspaces — elastic transitions
    animation = workspaces, 1, 5, cyberpunk, slidevert
    animation = specialWorkspace, 1, 4, glitch, slidefadevert -50%
}

# ── Decoration ────────────────────────────────────
decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.97

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.015
        vibrancy = 0.22
    }

    shadow {
        enabled = true
        range = 36
        render_power = 4
        color = rgba(05070d88)
        color_inactive = rgba(05070d66)
    }

    dim_inactive = false
}

# ── Layout ────────────────────────────────────────
# hy3 is the active layout (i3-like equal tiling). Keep master/dwindle tuned
# as fallbacks: hyprctl keyword general:layout master|dwindle
master {
    new_status = master
    mfact = 0.5
    new_on_top = false
    always_keep_position = true
}

# Dwindle fallback (binary-tree splits; switch with: hyprctl keyword general:layout dwindle)
dwindle {
    force_split = 2
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    # vfr disabled so Hypr-DarkWindow can drive per-frame shader animation
    # via NeedsConstantDamage → monitor->addDamage in PreRenderMonitor.
    # Under vfr=true the compositor stops rendering on idle, so time-based
    # shaders (x_Time references) appear frozen unless the window gets a
    # damage event from user input.
    vfr = false
    mouse_move_enables_dpms = true
    # Keep the current typing target stable even when apps request activation.
    focus_on_activate = false
    allow_session_lock_restore = false
}

render {
    direct_scanout = 0
}

cursor {
    no_hardware_cursors = 1
}

# ── Keybinds: Launch ─────────────────────────────
bindd = $mod, Return, Default terminal, exec, $term
bindd = $mod CTRL, Return, Persistent dev terminal, exec, $HOME/.local/bin/kitty-dev-launch
bindd = $mod ALT, Return, Raw terminal, exec, $HOME/.local/bin/kitty-visual-launch
bindd = $mod, D, App launcher, exec, $HOME/.local/bin/app-launcher
bindd = $mod, grave, Keybind reference, exec, pypr toggle keybinds
bindd = $mod, X, Dropdown terminal, exec, $HOME/hairglasses-studio/dotfiles/scripts/dropdown-terminal.sh
bindd = $mod, P, Power menu, exec, wlogout -p layer-shell
bindd = $mod CTRL, F, Restart menubar, exec, systemctl --user restart ironbar.service

# Plugin-backed navigation/workspace binds live in plugin-binds.conf and are
# sourced at runtime after split-monitor-workspaces and hyprexpo finish
# registering their dispatchers.

# ── Keybinds: Layout ────────────────────────────
bindd = $mod, F, Fullscreen, fullscreen, 0
bindd = $mod SHIFT, space, Toggle float, togglefloating
bindd = $mod, space, Cycle focus, cyclenext
bindd = $mod, A, Focus urgent/last, focusurgentorlast
bindd = $mod, minus, Swap with next, swapnext
bindd = $mod, comma, Swap prev, swapnext, prev
bindd = $mod, period, Swap next, swapnext

# ── Keybinds: Window management ──────────────────
bindd = $mod SHIFT, Q, Close window, killactive
bindd = ALT, Tab, App switcher, exec, $HOME/.local/bin/app-switcher
bindd = $mod SHIFT, R, Reload config, exec, hyprctl reload

# ── Keybinds: Resize ────────────────────────────
bindd = $mod SHIFT, semicolon, Enter resize mode, submap, resize
submap = resize
bindde = , H, Shrink width, resizeactive, -50 0
bindde = , J, Grow height, resizeactive, 0 50
bindde = , K, Shrink height, resizeactive, 0 -50
bindde = , L, Grow width, resizeactive, 50 0
bindd = , Return, Exit resize (Enter), submap, reset
bindd = , Escape, Exit resize (Esc), submap, reset
submap = reset

# ── Keybinds: Screenshots ──────────────────────
bindd = $mod, S, Screenshot full → clipboard, exec, hg-screenshot.sh full --clipboard
bindd = $mod SHIFT, S, Screenshot region → clipboard, exec, hg-screenshot.sh region --clipboard
bindd = $mod CTRL, S, Screenshot crop → save + clipboard, exec, hg-screenshot.sh region --both
bindd = $mod ALT, S, Screenshot delay 3s, exec, hg-screenshot.sh delay 3 --save
bindd = $mod ALT, R, Toggle screen recording, exec, hg-screenshot.sh record

# ── Keybinds: Clipboard & Color ────────────────
bindd = $mod, V, Clipboard history, exec, $term --class=clipse -e clipse
# Color picker is on $mod, C (line 252)

# ── Keybinds: Media ────────────────────────────
binddl = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
binddl = , XF86AudioNext, Next track, exec, playerctl next
binddl = , XF86AudioPrev, Previous track, exec, playerctl previous
binddl = , XF86AudioMute, Toggle mute, exec, swayosd-client --output-volume mute-toggle
bindde = , XF86AudioRaiseVolume, Volume up, exec, swayosd-client --output-volume raise
bindde = , XF86AudioLowerVolume, Volume down, exec, swayosd-client --output-volume lower
bindde = , XF86MonBrightnessUp, Brightness up, exec, swayosd-client --brightness raise
bindde = , XF86MonBrightnessDown, Brightness down, exec, swayosd-client --brightness lower

# ── Keybinds: Night light ───────────────────────
bindd = $mod SHIFT, T, Toggle night light, exec, pkill hyprsunset || hyprsunset --temperature 3500

# ── Keybinds: Kitty & Visual ────────────────────
bindd = $mod, G, Shader next, exec, $shaderctl shader-next
bindd = $mod SHIFT, G, Theme next, exec, $shaderctl next
bindd = $mod ALT, G, Shader toggle, exec, $shaderctl shader-toggle
bindd = $mod SHIFT, P, Theme prev, exec, $shaderctl prev
bindd = $mod CTRL, R, Safe rice reload (hyprland+ironbar+hyprshell hot-reload+dock+kitty+gtk+shaders), exec, rice-reload.sh
bindd = $mod CTRL, G, Reload kitty, exec, kill -USR1 $(pidof kitty)
bindd = $mod ALT, F, Font next, exec, $HOME/hairglasses-studio/dotfiles/scripts/font-playlist.sh next
bindd = $mod ALT SHIFT, F, Font prev, exec, $HOME/hairglasses-studio/dotfiles/scripts/font-playlist.sh prev

# ── Keybinds: Tools ──────────────────────────────
bindd = $mod, C, Color picker, exec, hyprpicker -a
bindd = $mod, Print, Screenshot annotate, exec, hg-screenshot.sh annotate
bindd = $mod SHIFT, Print, Screenshot full → save, exec, hg-screenshot.sh full --save
bindd = $mod CTRL, Print, Screenshot OCR → clipboard, exec, hg-screenshot.sh ocr
bindd = $mod CTRL, D, Toggle screen shader, exec, hyprshade toggle cyberpunk-vignette
bindd = $mod, E, Emoji picker, exec, wofi-emoji

# ── Keybinds: Notification center ────────────────
bindd = $mod, N, Toggle notification center, exec, swaync-client -t -sw
bindd = $mod SHIFT, N, Dismiss all notifications, exec, swaync-client -C

# ── Keybinds: Claude Code ───────────────────────
bindd = $mod CTRL, C, Agent session picker, exec, $HOME/hairglasses-studio/dotfiles/scripts/agent-session-picker.sh

# ── Keybinds: System ────────────────────────────
bindd = $mod SHIFT, W, Wallpaper shader next, exec, wallpaper-mode.sh shader next
bindd = $mod SHIFT CTRL, W, Wallpaper shader random, exec, wallpaper-mode.sh shader random
bindd = $mod SHIFT ALT, W, Wallpaper static random, exec, wallpaper-mode.sh static random
bindd = $mod CTRL, W, Wallpaper video mode, exec, wallpaper-mode.sh video
bindd = $mod ALT, W, Wallpaper depth mode, exec, wallpaper-mode.sh depth
bindd = $mod SHIFT, E, Power menu, exec, wlogout -p layer-shell

# ── Keybinds: Scratchpads ──────────────────────
bindd = $mod SHIFT, Return, Scratchpad: terminal, exec, pypr toggle term
bindd = $mod SHIFT, V, Scratchpad: volume, exec, pypr toggle volume
bindd = $mod SHIFT, F, Scratchpad: files, exec, pypr toggle files
bindd = $mod SHIFT, C, Scratchpad: Claude Code, exec, pypr toggle claude

# ── Keybinds: Mouse ──────────────────────────────
binddm = $mod, mouse:272, Move window (drag), movewindow
binddm = $mod, mouse:273, Resize window (drag), resizewindow

# ── Window rules (0.54 block syntax) ────────────

windowrule {
    name = quick-terminal
    match:class = ^(quick-terminal)$
    float = yes
    size = 800 500
}

windowrule {
    name = glslviewer
    match:class = ^(glslViewer)$
    float = yes
}

windowrule {
    name = scratchpad
    match:class = ^(scratchpad)$
    float = yes
}

windowrule {
    name = keybinds
    match:class = ^(keybinds)$
    float = yes
}

windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
}

windowrule {
    name = clipse
    match:class = ^(clipse)$
    float = yes
    size = 620 420
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
    size = 400 225
}

windowrule {
    name = dialogs
    match:title = ^(Open File|Save File|Confirm|About|Properties)$
    float = yes
}

windowrule {
    name = portal
    match:class = ^(xdg-desktop-portal)$
    float = yes
}

windowrule {
    name = hyprbars-non-kitty
    match:class = ^(?!kitty).*$
    hyprbars:no_bar = true
}

windowrule {
    name = keybind-ticker
    match:title = ^(keybind-ticker)$
    float = yes
    size = 2516 28
    move = 1832 958
    pin = yes
    decorate = false
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Groups/tabs ──────────────────────────────────
group {
    col.border_active = rgba(29f0ffee)
    col.border_inactive = rgba(46506daa)
    col.border_locked_active = rgba(ff47d1ee)
    col.border_locked_inactive = rgba(46506daa)

    groupbar {
        font_size = 11
        font_family = Maple Mono NF CN
        text_color = rgba(f7fbffff)
        col.active = rgba(29f0ff33)
        col.inactive = rgba(0f1219dd)
        col.locked_active = rgba(ff47d133)
        col.locked_inactive = rgba(151925cc)
        height = 22
        stacked = false
        render_titles = true
    }
}

# ── Plugins ──────────────────────────────────────
plugin {
    hy3 {
        group_inset = 0

        autotile {
            enable = true
            ephemeral_groups = true
            trigger_width = 300
            trigger_height = 120
            workspaces = all
        }
    }

    borders-plus-plus {
        add_borders = 2
        col.border_1 = rgb(29f0ff)
        border_size_1 = 1
        col.border_2 = rgb(ff47d1)
        border_size_2 = 2
        natural_rounding = 1
    }

    split-monitor-workspaces {
        count = 5
        keep_focused = 1
        enable_notifications = 0
        enable_persistent_workspaces = 1
    }

    hyprexpo {
        columns = 5
        gap_size = 12
        bg_col = rgb(05070d)
        workspace_method = center current
    }

    hyprbars {
        bar_height = 22
        bar_color = rgba(0d1018dd)
        col.text = rgba(f7fbffdd)
        bar_text_size = 12
        bar_text_font = Maple Mono NF CN
        bar_text_align = left
        bar_title_enabled = true
        bar_precedence_over_border = true
    }

    hyprfocus {
        enabled = true
        animate_floating = true
        animate_workspacechange = true
        focus_animation = flash

        flash {
            flash_opacity = 0.85
            in_bezier = neon
            in_speed = 0.3
            out_bezier = snappy
            out_speed = 0.8
        }
    }

    hyprwinwrap {
        class = desktop-bg
    }

    dynamic-cursors {
        enabled = true
        mode = tilt
        threshold = 2

        shake {
            enabled = true
            threshold = 4.0
            factor = 1.5
            speed = 4.0
            influence = 0.0
        }

        tilt {
            limit = 5000
            function = negative_quadratic
        }
    }

}

# ── Startup ──────────────────────────────────────
# Load hyprpm-managed plugins, then register their keybinds once dispatchers are
# available. `exec` reruns on reload, so plugin binds stay present after config
# changes without triggering parse-time "Invalid dispatcher" errors.
exec-once = hyprpm reload -n
exec = $HOME/hairglasses-studio/dotfiles/scripts/hypr-sync-plugin-binds.sh

# Session environment (enables XDG portals + screen sharing)
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME QT_QUICK_CONTROLS_MATERIAL_THEME QT_QUICK_CONTROLS_UNIVERSAL_THEME
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME QT_QUICK_CONTROLS_MATERIAL_THEME QT_QUICK_CONTROLS_UNIVERSAL_THEME

# Core desktop services
exec-once = systemctl --user start --no-block dotfiles-hyprshell.service
exec-once = systemctl --user start --no-block dotfiles-hypr-dock.service
exec-once = systemctl --user start --no-block dotfiles-hyprdynamicmonitors.service
exec-once = systemctl --user start --no-block dotfiles-hyprland-autoname-workspaces.service
exec-once = swaync
exec-once = swayosd-server
exec-once = systemctl --user start --no-block swww-daemon.service
exec-once = systemctl --user start --no-block ironbar.service
exec-once = systemctl --user start --no-block dotfiles-pyprland.service

# Clipboard
exec-once = clipse -listen
exec-once = wl-clip-persist --clipboard regular

# Visual effects (poll swww-daemon readiness instead of hardcoded sleep)
exec-once = sh -c 'for i in $(seq 1 30); do swww query >/dev/null 2>&1 && break; sleep 0.2; done; wallpaper-mode.sh restore'
exec-once = hyprsunset --temperature 4500

# Hardware (delayed — BT adapter + dongle need time)
exec-once = $HOME/hairglasses-studio/dotfiles/scripts/hypr-bt-boot.sh

# Boot diagnostics
exec-once = $HOME/hairglasses-studio/dotfiles/scripts/hypr-boot-log.sh

# ── Layer rules (bar/notification blur) ──────────
layerrule {
    name = bar-blur
    match:namespace = ^ironbar$
    blur = yes
    ignore_alpha = 0.3
}

layerrule {
    name = notif-blur
    match:namespace = ^(notifications|swaync-notification-window|swaync-control-center)$
    blur = yes
    ignore_alpha = 0.3
}

layerrule {
    name = wofi-blur
    match:namespace = ^(wofi)$
    blur = yes
    ignore_alpha = 0.3
}

layerrule {
    name = dock-blur
    match:namespace = ^(hypr-dock|dock-popup)$
    blur = yes
    ignore_alpha = 0.2
}

layerrule {
    name = wlogout-blur
    match:namespace = ^(logout_dialog)$
    blur = yes
    ignore_alpha = 0.3
}

# ── Per-app visual effects ────────────────────────
windowrule {
    name = kitty-glass
    match:class = ^(kitty)$
    opacity = 0.95 override 0.88 override
}

windowrule {
    name = firefox-perf
    match:class = ^(firefox)$
    no_blur = yes
}

windowrule {
    name = discord-glass
    match:class = ^(discord)$
    opacity = 0.90 override 0.80 override
}

windowrule {
    name = claude-session
    match:title = ^(────)
    border_color = rgb(ff47d1) rgb(29f0ff) 45deg
    opacity = 1.0 override 0.92 override
}

# ── Hypr-DarkWindow per-window shader registry ──
source = ~/hairglasses-studio/dotfiles/hyprland/darkwindow-shaders.conf

# ── Include machine-specific overrides ───────────
source = ~/.config/hypr/local.conf
