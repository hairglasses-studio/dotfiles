[pyprland]
plugins = ["scratchpads"]

[scratchpads.term]
command = "ghostty --class=scratchpad"
class = "scratchpad"
size = "80% 70%"
animation = "fromTop"

[scratchpads.keybinds]
command = "ghostty --class=keybinds --font-size=10 -e bash -c '$HOME/hairglasses-studio/dotfiles/scripts/hypr-keybinds.sh --md && glow -s $HOME/hairglasses-studio/dotfiles/glow/snazzy.json -p -w 0 $HOME/hairglasses-studio/dotfiles/hyprland/keybinds.md'"
class = "keybinds"
lazy = true

[scratchpads.volume]
command = "pavucontrol"
class = "pavucontrol"
size = "40% 60%"
animation = "fromRight"

[scratchpads.files]
command = "thunar"
class = "thunar"
size = "60% 60%"
animation = "fromLeft"
