# Cyberpunk hypridle config — idle power saving, lock disabled

general {
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Stage 1: Dim screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = hyprctl keyword decoration:dim_inactive true && hyprctl keyword decoration:dim_strength 0.4
    on-resume = hyprctl keyword decoration:dim_inactive false
}

# Stage 2: Turn off displays after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Stage 3: Suspend system after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
