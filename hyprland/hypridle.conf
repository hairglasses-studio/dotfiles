# Cyberpunk hypridle config — 4-stage gradual idle sequence

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Stage 1: Dim screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = hyprctl keyword decoration:dim_inactive true && hyprctl keyword decoration:dim_strength 0.4
    on-resume = hyprctl keyword decoration:dim_inactive false
}

# Stage 2: Lock screen after 10 minutes
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Stage 3: Turn off displays after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Stage 4: Suspend system after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
