# Cyberpunk hypridle config

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    unlock_cmd = wallpaper-cycle.sh random
}

# Dim screen after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprsunset --temperature 2500
    on-resume = pkill hyprsunset; hyprsunset --temperature 4500
}

# Lock after 15 minutes
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

# Screen off after 20 minutes
listener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
