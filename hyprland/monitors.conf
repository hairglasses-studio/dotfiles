# Per-machine monitor config (by model desc, survives port changes)
# XEC ES-G32C1Q (left, portrait)
monitor = desc:XEC ES-G32C1Q 0000000000000, 2560x1440@180, 560x0, 2, transform, 3

# Samsung LC49G95T ultrawide (right, primary)
monitor = desc:Samsung Electric Company LC49G95T XXXXXXXXXX, 5120x1440@240, 1280x387, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Workspace orientation (split-monitor-workspaces handles monitor binding)
# With new_status=master, ALL windows are masters:
#   orientation:top  → masters tile side-by-side (columns) → ultrawide
#   orientation:left → masters tile top-to-bottom (rows)   → portrait
# Samsung ultrawide (DP-2): workspaces 1-9
workspace = 1, layoutopt:orientation:top
workspace = 2, layoutopt:orientation:top
workspace = 3, layoutopt:orientation:top
workspace = 4, layoutopt:orientation:top
workspace = 5, layoutopt:orientation:top
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
# XEC portrait (DP-1): workspaces 10-18
workspace = 10, layoutopt:orientation:left
workspace = 11, layoutopt:orientation:left
workspace = 12, layoutopt:orientation:left
workspace = 13, layoutopt:orientation:left
workspace = 14, layoutopt:orientation:left
workspace = 15, layoutopt:orientation:left
workspace = 16, layoutopt:orientation:left
workspace = 17, layoutopt:orientation:left
workspace = 18, layoutopt:orientation:left
