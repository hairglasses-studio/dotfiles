# Per-machine monitor config
# XEC ES-G32C1Q (left)
monitor = DP-1, 2560x1440@60, 0x0, 2

# Samsung LC49G95T ultrawide (right, primary)
monitor = DP-2, 5120x1440@120, 1280x0, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Bind workspaces to monitors
# DP-1 (left): workspaces 1-3
# DP-2 (ultrawide): workspaces 4-9
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2, default:true
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
