# Per-machine monitor config (stable output names keep serials out of git)
# Samsung ultrawide primary on the left/lower position
# vrr=2 enables fullscreen-only adaptive refresh (NVIDIA-safe against backlight flicker)
monitor = DP-3, 5120x1440@239.76, 1810x280, 2, vrr, 2

# XEC portrait utility monitor on the right
monitor = DP-2, 2560x1440@180, 4370x0, 2, transform, 3, vrr, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Workspace orientation defaults (master layout fallback)
# split-monitor-workspaces count=5: ws 1-5 → DP-2, ws 6-10 → DP-3
# XEC portrait (DP-2): ws 1-5
workspace = 1, layoutopt:orientation:left
workspace = 2, layoutopt:orientation:left
workspace = 3, layoutopt:orientation:left
workspace = 4, layoutopt:orientation:left
workspace = 5, layoutopt:orientation:left
# Samsung ultrawide (DP-3): ws 6-10
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
workspace = 10, layoutopt:orientation:top
