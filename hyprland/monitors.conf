# Per-machine monitor config (by model desc, survives port changes)
# XEC ES-G32C1Q (left)
monitor = desc:XEC ES-G32C1Q 0000000000000, 2560x1440@60, 0x0, 2

# Samsung LC49G95T ultrawide (right, primary)
monitor = desc:Samsung Electric Company LC49G95T H1AK500000, 5120x1440@120, 1280x0, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Bind workspaces to monitors (by model desc, survives port changes)
# XEC ES-G32C1Q (left): workspaces 1-3
# Samsung LC49G95T (ultrawide): workspaces 4-9
workspace = 1, monitor:desc:XEC ES-G32C1Q, default:true
workspace = 2, monitor:desc:XEC ES-G32C1Q
workspace = 3, monitor:desc:XEC ES-G32C1Q
workspace = 4, monitor:desc:Samsung Electric Company LC49G95T
workspace = 5, monitor:desc:Samsung Electric Company LC49G95T, default:true
workspace = 6, monitor:desc:Samsung Electric Company LC49G95T
workspace = 7, monitor:desc:Samsung Electric Company LC49G95T
workspace = 8, monitor:desc:Samsung Electric Company LC49G95T
workspace = 9, monitor:desc:Samsung Electric Company LC49G95T
