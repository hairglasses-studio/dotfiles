# Per-machine monitor config (by model desc, survives port changes)
# XEC ES-G32C1Q (left, portrait)
monitor = desc:XEC ES-G32C1Q 0000000000000, 2560x1440@180, 560x0, 2, transform, 3

# Samsung LC49G95T ultrawide (right, primary)
monitor = desc:Samsung Electric Company LC49G95T H1AK500000, 5120x1440@240, 1280x387, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Bind workspaces to monitors (by model desc, survives port changes)
# XEC ES-G32C1Q (left, portrait): workspaces 1-3 — top orientation (full-width rows)
# Samsung LC49G95T (ultrawide): workspaces 4-9 — left orientation (full-height columns)
workspace = 1, monitor:desc:XEC ES-G32C1Q, default:true, layoutopt:orientation:top
workspace = 2, monitor:desc:XEC ES-G32C1Q, layoutopt:orientation:top
workspace = 3, monitor:desc:XEC ES-G32C1Q, layoutopt:orientation:top
workspace = 4, monitor:desc:Samsung Electric Company LC49G95T, layoutopt:orientation:left
workspace = 5, monitor:desc:Samsung Electric Company LC49G95T, default:true, layoutopt:orientation:left
workspace = 6, monitor:desc:Samsung Electric Company LC49G95T, layoutopt:orientation:left
workspace = 7, monitor:desc:Samsung Electric Company LC49G95T, layoutopt:orientation:left
workspace = 8, monitor:desc:Samsung Electric Company LC49G95T, layoutopt:orientation:left
workspace = 9, monitor:desc:Samsung Electric Company LC49G95T, layoutopt:orientation:left
