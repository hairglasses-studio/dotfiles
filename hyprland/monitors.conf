# Per-machine monitor config (stable output names keep serials out of git).
# This file is a static fallback; the authoritative runtime config is
# ~/.local/state/hypr/monitors.dynamic.conf, populated by
# hyprdynamicmonitors from hyprdynamicmonitors/hyprconfigs/. Keep both
# in sync with the live layout so reloads don't retry invalid modes.

# 3-monitor layout (updated 2026-04-23) — two portrait XEC panels
# flanking the Samsung LC49G95T native ultrawide center.
#   HDMI-A-1 = XEC ES-G32C1Q, 2560x1440@60,    scale 2, transform 1 (90° CCW).
#   DP-3     = Samsung LC49G95T, 5120x1440@240, scale 1 (DSC native).
#   DP-2     = XEC ES-G32C1Q, 2560x1440@180,   scale 2, transform 3 (270° CCW).
# DSC negotiation is currently working — Samsung exposes its native
# 5120x1440@239.76Hz mode in availableModes. If DSC drops out (Samsung
# stuck at 0x0 or only 2560x1440 fallback in availableModes after a
# session restart), revert DP-3 to `2560x1440@59.95, 6036x248, 2`,
# drop scale back to 2, shift DP-2 left to 7316,0, and pull HDMI's y
# back to 0. See .claude/rules/nvidia-wayland.md for the DSC recovery
# procedure (hardware power-cycle).
#
# Logical geometry:
#   HDMI-A-1: x  5316..6036,  y   80..1360 (portrait, scale=2, 720x1280)
#   DP-3:     x  6036..11156, y    0..1440 (Samsung native, scale=1, 5120x1440)
#   DP-2:     x 11156..11876, y   80..1360 (portrait, scale=2, 720x1280)
# Samsung is the tallest panel (1440 logical) so it anchors y=0; the
# flanking portraits sit at y=80 to vertically center inside Samsung's
# canvas (1440-1280)/2 = 80. Edges meet cleanly — no overlap.
monitor = HDMI-A-1, 2560x1440@59.95,   5316x80,  2, transform, 1
monitor = DP-3,     5120x1440@239.76,  6036x0,   1
monitor = DP-2,     2560x1440@180,    11156x80,  2, transform, 3

# No catch-all wildcard — it otherwise resets scale + transform on every
# reload. Hotplug of unknown monitors will use Hyprland's compiled-in
# defaults (preferred mode, scale=1), which is acceptable.

# Workspace orientation defaults (split-monitor-workspaces count=5)
# ws 1-5 → HDMI-A-1 (portrait), ws 6-10 → DP-2 (portrait), ws 11-15 → DP-3 (landscape).
workspace = 1, layoutopt:orientation:top
workspace = 2, layoutopt:orientation:top
workspace = 3, layoutopt:orientation:top
workspace = 4, layoutopt:orientation:top
workspace = 5, layoutopt:orientation:top
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
workspace = 10, layoutopt:orientation:top
