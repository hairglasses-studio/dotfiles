# Per-machine monitor config (by model desc, survives port changes)
# XEC ES-G32C1Q (left, portrait)
monitor = desc:XEC ES-G32C1Q 0000000000000, 2560x1440@180, 560x0, 2, transform, 3

# Samsung LC49G95T ultrawide (right, primary)
monitor = desc:Samsung Electric Company LC49G95T XXXXXXXXXX, 5120x1440@240, 1280x387, 2

# Fallback for hotplug
monitor = , preferred, auto, 2

# Workspace orientation (split-monitor-workspaces handles monitor binding)
# Samsung ultrawide (DP-2): workspaces 1-9 — left orientation (full-height columns)
# XEC portrait (DP-1): workspaces 10-18 — top orientation (full-width rows)
workspace = 1, layoutopt:orientation:left
workspace = 2, layoutopt:orientation:left
workspace = 3, layoutopt:orientation:left
workspace = 4, layoutopt:orientation:left
workspace = 5, layoutopt:orientation:left
workspace = 6, layoutopt:orientation:left
workspace = 7, layoutopt:orientation:left
workspace = 8, layoutopt:orientation:left
workspace = 9, layoutopt:orientation:left
workspace = 10, layoutopt:orientation:top
workspace = 11, layoutopt:orientation:top
workspace = 12, layoutopt:orientation:top
workspace = 13, layoutopt:orientation:top
workspace = 14, layoutopt:orientation:top
workspace = 15, layoutopt:orientation:top
workspace = 16, layoutopt:orientation:top
workspace = 17, layoutopt:orientation:top
workspace = 18, layoutopt:orientation:top
