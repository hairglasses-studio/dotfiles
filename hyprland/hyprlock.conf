# ── Cyberpunk Hyprlock // Snazzy-on-Black ────────────────────────────
# Hyprlock 0.9.2 — dual monitor (portrait XEC + 49" Samsung ultrawide)

# ── Background ──────────────────────────────────────────────────────

background {
    monitor =
    color = rgba(000000ff)
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    vibrancy = 0.2
}

# ── Decorative scanlines ────────────────────────────────────────────

shape {
    monitor =
    size = 2000, 1
    color = rgba(57c7ff44)
    position = 0, 160
    halign = center
    valign = center
}

shape {
    monitor =
    size = 2000, 1
    color = rgba(ff6ac133)
    position = 0, -260
    halign = center
    valign = center
}

# ── HUD corner brackets ────────────────────────────────────────────

label {
    monitor =
    text = [
    color = rgba(57c7ff22)
    font_size = 80
    font_family = Maple Mono NF CN
    position = 40, -40
    halign = left
    valign = top
}

label {
    monitor =
    text = ]
    color = rgba(57c7ff22)
    font_size = 80
    font_family = Maple Mono NF CN
    position = -40, -40
    halign = right
    valign = top
}

label {
    monitor =
    text = [
    color = rgba(ff6ac122)
    font_size = 80
    font_family = Maple Mono NF CN
    position = 40, 40
    halign = left
    valign = bottom
}

label {
    monitor =
    text = ]
    color = rgba(ff6ac122)
    font_size = 80
    font_family = Maple Mono NF CN
    position = -40, 40
    halign = right
    valign = bottom
}

# ── Large clock ─────────────────────────────────────────────────────

label {
    monitor =
    text = $TIME
    color = rgba(57c7ffee)
    font_size = 72
    font_family = Maple Mono NF CN
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(57c7ff66)
}

# ── Date ────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A  %B %d')"
    color = rgba(686868ff)
    font_size = 18
    font_family = Maple Mono NF CN
    position = 0, 30
    halign = center
    valign = center
}

# ── Auth label ──────────────────────────────────────────────────────

label {
    monitor =
    text = CYBERSEC AUTHENTICATION PROTOCOL
    color = rgba(5af78e99)
    font_size = 10
    font_family = Maple Mono NF CN
    position = 0, -140
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(5af78e44)
}

# ── Input field ─────────────────────────────────────────────────────

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(57c7ffee)
    inner_color = rgba(1a1a1a88)
    font_color = rgba(f1f1f0ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##686868">ACCESS DENIED</span>
    hide_input = false
    check_color = rgba(5af78eee)
    fail_color = rgba(ff5c57ee)
    fail_text = <span foreground="##ff5c57">BREACH DETECTED</span>
    capslock_color = rgba(f3f99dee)
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(57c7ff55)
}

# ── System info ─────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:5000] echo "$(whoami)@$(hostname)"
    color = rgba(ff6ac1aa)
    font_size = 10
    font_family = Maple Mono NF CN
    position = 0, -280
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] echo "UPTIME $(uptime -p | sed 's/up //')"
    color = rgba(68686888)
    font_size = 9
    font_family = Maple Mono NF CN
    position = 0, -300
    halign = center
    valign = center
}

# ── Animated scanning text ──────────────────────────────────────────

label {
    monitor =
    text = cmd[update:2000] echo "SCANNING $(shuf -n1 -e RETINA NEURAL VOICE FINGERPRINT BIOMETRIC CORTEX) SIGNATURE"
    color = rgba(57c7ff33)
    font_size = 8
    font_family = Maple Mono NF CN
    position = 0, -330
    halign = center
    valign = center
}

# ── Status indicators ──────────────────────────────────────────────

label {
    monitor =
    text = SYSTEM ONLINE // SECURITY ACTIVE
    color = rgba(5af78e66)
    font_size = 8
    font_family = Maple Mono NF CN
    position = 0, -360
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] uname -r | cut -d'-' -f1
    color = rgba(68686855)
    font_size = 7
    font_family = Maple Mono NF CN
    position = 30, 30
    halign = right
    valign = bottom
}
