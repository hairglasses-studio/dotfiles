# Cyberpunk hyprlock config

background {
    monitor =
    color = rgba(000000ff)
    blur_passes = 3
    blur_size = 6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(57c7ffee)
    inner_color = rgba(000000cc)
    font_color = rgba(f1f1f0ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##686868">AUTHENTICATE //</span>
    hide_input = false
    check_color = rgba(5af78eee)
    fail_color = rgba(ff5c57ee)
    fail_text = <span foreground="##ff5c57">ACCESS DENIED</span>
    capslock_color = rgba(ff6ac1ee)
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgba(f1f1f0ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(57c7ff66)
}

label {
    monitor =
    text = CYBERNET // $DESC
    color = rgba(57c7ff99)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}
