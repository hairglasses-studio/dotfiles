# ── Voltage After Dark Hyprlock ─────────────────────────────────────
# Hyprlock 0.9.2 — dual monitor (portrait XEC + 49" Samsung ultrawide)

# ── Background ──────────────────────────────────────────────────────

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.015
    vibrancy = 0.22
}

# ── Decorative scanlines ────────────────────────────────────────────

shape {
    monitor =
    size = 2000, 1
    color = rgba(6ae4ff44)
    position = 0, 160
    halign = center
    valign = center
}

shape {
    monitor =
    size = 2000, 1
    color = rgba(ff6ad533)
    position = 0, -260
    halign = center
    valign = center
}

# ── HUD corner brackets ────────────────────────────────────────────

label {
    monitor =
    text = [
    color = rgba(6ae4ff22)
    font_size = 80
    font_family = Maple Mono NF CN
    position = 40, -40
    halign = left
    valign = top
}

label {
    monitor =
    text = ]
    color = rgba(6ae4ff22)
    font_size = 80
    font_family = Maple Mono NF CN
    position = -40, -40
    halign = right
    valign = top
}

label {
    monitor =
    text = [
    color = rgba(ff6ad522)
    font_size = 80
    font_family = Maple Mono NF CN
    position = 40, 40
    halign = left
    valign = bottom
}

label {
    monitor =
    text = ]
    color = rgba(ff6ad522)
    font_size = 80
    font_family = Maple Mono NF CN
    position = -40, 40
    halign = right
    valign = bottom
}

# ── Large clock ─────────────────────────────────────────────────────

label {
    monitor =
    text = $TIME
    color = rgba(eef3ffff)
    font_size = 72
    font_family = Maple Mono NF CN
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(6ae4ff55)
}

# ── Date ────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A  %B %d')"
    color = rgba(7b86a8ff)
    font_size = 18
    font_family = Maple Mono NF CN
    position = 0, 30
    halign = center
    valign = center
}

# ── Auth label ──────────────────────────────────────────────────────

label {
    monitor =
    text = UNLOCK THE STACK
    color = rgba(86ffb299)
    font_size = 11
    font_family = Maple Mono NF CN
    position = 0, -140
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(86ffb244)
}

# ── Input field ─────────────────────────────────────────────────────

input-field {
    monitor =
    size = 340, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(6ae4ffee)
    inner_color = rgba(0d1018dd)
    font_color = rgba(eef3ffff)
    fade_on_empty = true
    placeholder_text = <span foreground="##7b86a8">enter passphrase</span>
    hide_input = true
    check_color = rgba(86ffb2ee)
    fail_color = rgba(ff6b82ee)
    fail_text = <span foreground="##ff6b82">retry</span>
    capslock_color = rgba(ffd36eee)
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(6ae4ff44)
}

# ── System info ─────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:5000] echo "$(whoami) • $(hostname)"
    color = rgba(ff6ad5bb)
    font_size = 10
    font_family = Maple Mono NF CN
    position = 0, -280
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] echo "UPTIME $(uptime -p | sed 's/up //')"
    color = rgba(7b86a888)
    font_size = 9
    font_family = Maple Mono NF CN
    position = 0, -300
    halign = center
    valign = center
}

# ── Animated scanning text ──────────────────────────────────────────

label {
    monitor =
    text = cmd[update:2000] echo "FOCUS RESTORES ON SUCCESSFUL AUTH"
    color = rgba(6ae4ff44)
    font_size = 8
    font_family = Maple Mono NF CN
    position = 0, -330
    halign = center
    valign = center
}

# ── Status indicators ──────────────────────────────────────────────

label {
    monitor =
    text = HYPRLAND // WAYLAND // READY
    color = rgba(86ffb266)
    font_size = 8
    font_family = Maple Mono NF CN
    position = 0, -360
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] uname -r | cut -d'-' -f1
    color = rgba(7b86a855)
    font_size = 7
    font_family = Maple Mono NF CN
    position = 30, 30
    halign = right
    valign = bottom
}
