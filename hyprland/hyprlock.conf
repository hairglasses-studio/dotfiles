# ── Cyberpunk hyprlock ────────────────────────────

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.7
    vibrancy = 0.2
}

# ── Decorative scanlines ─────────────────────────

shape {
    monitor =
    size = 2000, 2
    color = rgba(57c7ff66)
    position = 0, 120
    halign = center
    valign = top
}

shape {
    monitor =
    size = 2000, 2
    color = rgba(ff6ac14d)
    position = 0, -120
    halign = center
    valign = bottom
}

# ── Time display ─────────────────────────────────

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgba(57c7ffff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(57c7ff99)
}

# ── Auth label ───────────────────────────────────

label {
    monitor =
    text = CYBERSEC AUTHENTICATION PROTOCOL
    color = rgba(5af78ecc)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(5af78e66)
}

# ── Input field ──────────────────────────────────

input-field {
    monitor =
    size = 350, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(57c7ffee)
    inner_color = rgba(000000cc)
    font_color = rgba(f1f1f0ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##686868">AUTHENTICATE //</span>
    hide_input = false
    check_color = rgba(5af78eee)
    fail_color = rgba(ff5c57ee)
    fail_text = <span foreground="##ff5c57">ACCESS DENIED</span>
    capslock_color = rgba(ff6ac1ee)
    position = 0, -30
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(57c7ff88)
}

# ── System info ──────────────────────────────────

label {
    monitor =
    text = cmd[update:5000] echo "$(whoami)@$(hostname)"
    color = rgba(ff6ac1aa)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] echo "UPTIME $(uptime -p | sed 's/up //')"
    color = rgba(68686899)
    font_size = 9
    font_family = JetBrainsMono Nerd Font
    position = 0, -130
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%A  %B %d  %Y'
    color = rgba(686868aa)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -150
    halign = center
    valign = center
}

# ── Status indicators ────────────────────────────

label {
    monitor =
    text = SYSTEM ONLINE // SECURITY ACTIVE
    color = rgba(5af78e88)
    font_size = 8
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] uname -r | cut -d'-' -f1
    color = rgba(68686866)
    font_size = 7
    font_family = JetBrainsMono Nerd Font
    position = 30, 30
    halign = right
    valign = bottom
}
