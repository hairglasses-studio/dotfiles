# Runtime-loaded plugin binds. This fragment is sourced by
# scripts/hypr-sync-plugin-binds.sh after hy3, split-monitor-workspaces, and
# hyprexpo register their dispatchers.

# Clear the plugin-backed keys first so repeated reloads stay idempotent.
unbind = SUPER,H
unbind = SUPER,J
unbind = SUPER,K
unbind = SUPER,L
unbind = SUPER,left
unbind = SUPER,right
unbind = SUPER,down
unbind = SUPER,up
unbind = ,F13
unbind = ,F14
unbind = SUPER SHIFT,H
unbind = SUPER SHIFT,J
unbind = SUPER SHIFT,K
unbind = SUPER SHIFT,L
unbind = SUPER SHIFT,left
unbind = SUPER SHIFT,right
unbind = SUPER SHIFT,down
unbind = SUPER SHIFT,up
unbind = SUPER,backslash
unbind = SUPER,T
unbind = SUPER,bracketright
unbind = SUPER,bracketleft
unbind = SUPER SHIFT,bracketright
unbind = SUPER SHIFT,bracketleft
unbind = SUPER,1
unbind = SUPER,2
unbind = SUPER,3
unbind = SUPER,4
unbind = SUPER,5
unbind = SUPER SHIFT,1
unbind = SUPER SHIFT,2
unbind = SUPER SHIFT,3
unbind = SUPER SHIFT,4
unbind = SUPER SHIFT,5
unbind = SUPER,Tab
unbind = SUPER SHIFT,Tab
unbind = SHIFT,H
unbind = SHIFT,J
unbind = SHIFT,K
unbind = SHIFT,L

# ── Keybinds: Navigation ────────────────────────
bindd = SUPER, H, Focus left (hjkl), hy3:movefocus, l
bindd = SUPER, J, Focus down (hjkl), hy3:movefocus, d
bindd = SUPER, K, Focus up (hjkl), hy3:movefocus, u
bindd = SUPER, L, Focus right (hjkl), hy3:movefocus, r
bindd = SUPER, left, Focus left (arrow), hy3:movefocus, l
bindd = SUPER, right, Focus right (arrow), hy3:movefocus, r
bindd = SUPER, down, Focus down (arrow), hy3:movefocus, d
bindd = SUPER, up, Focus up (arrow), hy3:movefocus, u

# ── Keybinds: Rotary encoder ────────────────────
bindd = , F13, Encoder: focus left, hy3:movefocus, l
bindd = , F14, Encoder: focus right, hy3:movefocus, r

# ── Keybinds: Move windows ─────────────────────
bindd = SUPER SHIFT, H, Move window left (hjkl), hy3:movewindow, l, once
bindd = SUPER SHIFT, J, Move window down (hjkl), hy3:movewindow, d, once
bindd = SUPER SHIFT, K, Move window up (hjkl), hy3:movewindow, u, once
bindd = SUPER SHIFT, L, Move window right (hjkl), hy3:movewindow, r, once
bindd = SUPER SHIFT, left, Move window left (arrow), hy3:movewindow, l, once
bindd = SUPER SHIFT, right, Move window right (arrow), hy3:movewindow, r, once
bindd = SUPER SHIFT, down, Move window down (arrow), hy3:movewindow, d, once
bindd = SUPER SHIFT, up, Move window up (arrow), hy3:movewindow, u, once

# ── Keybinds: Layout ────────────────────────────
bindd = SUPER, backslash, Toggle split direction, hy3:changegroup, opposite
bindd = SUPER, T, Equalize workspace, hy3:equalize, workspace
bindd = SUPER, bracketright, Next workspace, split-cycleworkspaces, next
bindd = SUPER, bracketleft, Previous workspace, split-cycleworkspaces, prev
bindd = SUPER SHIFT, bracketright, Move to next workspace, split-movetoworkspace, +1
bindd = SUPER SHIFT, bracketleft, Move to previous workspace, split-movetoworkspace, -1

# ── Keybinds: Workspaces (5 per monitor, 10 total) ──
bindd = SUPER, 1, Workspace 1, split-workspace, 1
bindd = SUPER, 2, Workspace 2, split-workspace, 2
bindd = SUPER, 3, Workspace 3, split-workspace, 3
bindd = SUPER, 4, Workspace 4, split-workspace, 4
bindd = SUPER, 5, Workspace 5, split-workspace, 5
bindd = SUPER SHIFT, 1, Move to workspace 1, split-movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to workspace 2, split-movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to workspace 3, split-movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to workspace 4, split-movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to workspace 5, split-movetoworkspace, 5

# ── Keybinds: Window management ──────────────────
bindd = SUPER, Tab, Workspace overview, hyprexpo:expo, toggle
bindd = SUPER SHIFT, Tab, Send to other monitor, split-changemonitor, next

# ── Keybinds: Resize ────────────────────────────
submap = resize
bindd = SHIFT, H, Move left, hy3:movewindow, l, once
bindd = SHIFT, J, Move down, hy3:movewindow, d, once
bindd = SHIFT, K, Move up, hy3:movewindow, u, once
bindd = SHIFT, L, Move right, hy3:movewindow, r, once
submap = reset
