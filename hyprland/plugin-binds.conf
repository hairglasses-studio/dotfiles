# Runtime-loaded plugin binds. This fragment is sourced by
# scripts/hypr-sync-plugin-binds.sh after split-monitor-workspaces and
# hyprexpo register their dispatchers.

# Clear the plugin-backed keys first so repeated reloads stay idempotent.
unbind = SUPER,H
unbind = SUPER,J
unbind = SUPER,K
unbind = SUPER,L
unbind = SUPER,left
unbind = SUPER,right
unbind = SUPER,down
unbind = SUPER,up
unbind = ,F13
unbind = ,F14
unbind = SUPER SHIFT,H
unbind = SUPER SHIFT,J
unbind = SUPER SHIFT,K
unbind = SUPER SHIFT,L
unbind = SUPER SHIFT,left
unbind = SUPER SHIFT,right
unbind = SUPER SHIFT,down
unbind = SUPER SHIFT,up
unbind = SUPER,backslash
unbind = SUPER,T
unbind = SUPER,bracketright
unbind = SUPER,bracketleft
unbind = SUPER SHIFT,bracketright
unbind = SUPER SHIFT,bracketleft
unbind = SUPER,1
unbind = SUPER,2
unbind = SUPER,3
unbind = SUPER,4
unbind = SUPER,5
unbind = SUPER,6
unbind = SUPER,7
unbind = SUPER,8
unbind = SUPER,9
unbind = SUPER SHIFT,1
unbind = SUPER SHIFT,2
unbind = SUPER SHIFT,3
unbind = SUPER SHIFT,4
unbind = SUPER SHIFT,5
unbind = SUPER SHIFT,6
unbind = SUPER SHIFT,7
unbind = SUPER SHIFT,8
unbind = SUPER SHIFT,9
unbind = SUPER,Tab
unbind = SUPER SHIFT,Tab
unbind = SHIFT,H
unbind = SHIFT,J
unbind = SHIFT,K
unbind = SHIFT,L

# ── Keybinds: Navigation ────────────────────────
bindd = SUPER, H, Focus left (hjkl), movefocus, l
bindd = SUPER, J, Focus down (hjkl), movefocus, d
bindd = SUPER, K, Focus up (hjkl), movefocus, u
bindd = SUPER, L, Focus right (hjkl), movefocus, r
bindd = SUPER, left, Focus left (arrow), movefocus, l
bindd = SUPER, right, Focus right (arrow), movefocus, r
bindd = SUPER, down, Focus down (arrow), movefocus, d
bindd = SUPER, up, Focus up (arrow), movefocus, u

# ── Keybinds: Rotary encoder ────────────────────
bindd = , F13, Encoder: focus left, movefocus, l
bindd = , F14, Encoder: focus right, movefocus, r

# ── Keybinds: Move windows ─────────────────────
bindd = SUPER SHIFT, H, Move window left (hjkl), movewindow, l, once
bindd = SUPER SHIFT, J, Move window down (hjkl), movewindow, d, once
bindd = SUPER SHIFT, K, Move window up (hjkl), movewindow, u, once
bindd = SUPER SHIFT, L, Move window right (hjkl), movewindow, r, once
bindd = SUPER SHIFT, left, Move window left (arrow), movewindow, l, once
bindd = SUPER SHIFT, right, Move window right (arrow), movewindow, r, once
bindd = SUPER SHIFT, down, Move window down (arrow), movewindow, d, once
bindd = SUPER SHIFT, up, Move window up (arrow), movewindow, u, once

# ── Keybinds: Layout ────────────────────────────
bindd = SUPER, bracketright, Next workspace, split-cycleworkspaces, next
bindd = SUPER, bracketleft, Previous workspace, split-cycleworkspaces, prev
bindd = SUPER SHIFT, bracketright, Move to next workspace, split-movetoworkspace, +1
bindd = SUPER SHIFT, bracketleft, Move to previous workspace, split-movetoworkspace, -1

# ── Keybinds: Workspaces ────────────────────────
bindd = SUPER, 1, Workspace 1, split-workspace, 1
bindd = SUPER, 2, Workspace 2, split-workspace, 2
bindd = SUPER, 3, Workspace 3, split-workspace, 3
bindd = SUPER, 4, Workspace 4, split-workspace, 4
bindd = SUPER, 5, Workspace 5, split-workspace, 5
bindd = SUPER, 6, Workspace 6, split-workspace, 6
bindd = SUPER, 7, Workspace 7, split-workspace, 7
bindd = SUPER, 8, Workspace 8, split-workspace, 8
bindd = SUPER, 9, Workspace 9, split-workspace, 9
bindd = SUPER SHIFT, 1, Move to workspace 1, split-movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to workspace 2, split-movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to workspace 3, split-movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to workspace 4, split-movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to workspace 5, split-movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move to workspace 6, split-movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move to workspace 7, split-movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move to workspace 8, split-movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move to workspace 9, split-movetoworkspace, 9

# ── Keybinds: Window management ──────────────────
bindd = SUPER, Tab, Workspace overview, hyprexpo:expo, toggle
bindd = SUPER SHIFT, Tab, Send to other monitor, split-changemonitor, next

# ── Keybinds: Resize ────────────────────────────
submap = resize
bindd = SHIFT, H, Move left, movewindow, l, once
bindd = SHIFT, J, Move down, movewindow, d, once
bindd = SHIFT, K, Move up, movewindow, u, once
bindd = SHIFT, L, Move right, movewindow, r, once
submap = reset
