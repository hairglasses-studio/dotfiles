name: Repo Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run hygiene checks
        run: |
          curl -sL https://raw.githubusercontent.com/hairglasses-studio/.github/main/scripts/check-repo-hygiene.sh -o check-repo-hygiene.sh
          bash check-repo-hygiene.sh --require-roadmap --require-makefile --no-require-codeowners --max-root-docs 14 --allow-extra-docs "INFRASTRUCTURE.md,MCP-ROADMAP.md,codebase-intelligence-prompt.md"
