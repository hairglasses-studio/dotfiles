name: BATS Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'scripts/**'
      - 'kitty/**'
      - 'hyprshell/**'
      - 'hyprland/**'
      - 'pypr/**'
      - 'install.sh'
      - 'manjaro/install.sh'
      - 'ironbar/**'
      - 'systemd/**'
      - '.agents/skills/**'
      - '.claude/skills/**'
      - '.github/workflows/ci-bats.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'scripts/**'
      - 'kitty/**'
      - 'hyprshell/**'
      - 'hyprland/**'
      - 'pypr/**'
      - 'install.sh'
      - 'manjaro/install.sh'
      - 'ironbar/**'
      - 'systemd/**'
      - '.agents/skills/**'
      - '.claude/skills/**'
      - '.github/workflows/ci-bats.yml'

permissions:
  contents: read

concurrency:
  group: ci-bats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    name: Shell Tests
    runs-on: [self-hosted, archglasses, optimized]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats bats-support bats-assert

      - name: Run library tests
        run: bats tests/lib_*.bats

      - name: Run script tests
        run: bats tests/hg_*.bats tests/rice_selftest.bats

      - name: Run installer reliability tests
        run: bats tests/install_check_worktree.bats tests/repo_smoke.bats

      - name: Run launcher and shell policy tests
        run: bats tests/tmux_session.bats tests/shell_env.bats tests/app_launcher.bats
