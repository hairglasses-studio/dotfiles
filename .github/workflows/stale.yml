name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: [self-hosted, archglasses, optimized]
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          days-before-stale: 60
          days-before-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,wontfix
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 7 days
            unless there is new activity. Remove the `stale` label to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity.
