name: Go MCP CI

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - 'make/golangci.yml'
      - '.github/workflows/ci-go-mcp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp/**'
      - 'make/golangci.yml'
      - '.github/workflows/ci-go-mcp.yml'

permissions:
  contents: read

concurrency:
  group: ci-go-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: [self-hosted, archglasses, optimized]
    strategy:
      matrix:
        include:
          - module: dotfiles-mcp
            gowork: ""
          - module: hg-mcp
            gowork: ""
          - module: mapitall
            gowork: ""
          - module: mapping
            gowork: off
          - module: process-mcp
            gowork: ""
          - module: systemd-mcp
            gowork: ""
          - module: tmux-mcp
            gowork: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: mcp/go.work
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        env:
          GOWORK: ${{ matrix.gowork }}
        with:
          working-directory: mcp/${{ matrix.module }}
          args: --config ../../make/golangci.yml

  test:
    name: Test (${{ matrix.module }})
    runs-on: [self-hosted, archglasses, optimized]
    strategy:
      matrix:
        include:
          - module: dotfiles-mcp
            gowork: ""
          - module: hg-mcp
            gowork: ""
          - module: mapitall
            gowork: ""
          - module: mapping
            gowork: off
          - module: process-mcp
            gowork: ""
          - module: systemd-mcp
            gowork: ""
          - module: tmux-mcp
            gowork: ""
    defaults:
      run:
        working-directory: mcp/${{ matrix.module }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: mcp/go.work
      - name: Configure module workspace mode
        run: echo "GOWORK=${{ matrix.gowork }}" >> "$GITHUB_ENV"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            echo "### Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            go tool cover -func=coverage.out | tail -20 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: coverage-go-mcp-${{ matrix.module }}
          path: mcp/${{ matrix.module }}/coverage.out
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        if: always()
        with:
          files: mcp/${{ matrix.module }}/coverage.out
          flags: go-mcp,${{ matrix.module }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (${{ matrix.module }})
    runs-on: [self-hosted, archglasses, optimized]
    strategy:
      matrix:
        include:
          - module: dotfiles-mcp
            gowork: ""
          - module: hg-mcp
            gowork: ""
          - module: mapitall
            gowork: ""
          - module: mapping
            gowork: off
          - module: process-mcp
            gowork: ""
          - module: systemd-mcp
            gowork: ""
          - module: tmux-mcp
            gowork: ""
    defaults:
      run:
        working-directory: mcp/${{ matrix.module }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: mcp/go.work
      - name: Configure module workspace mode
        run: echo "GOWORK=${{ matrix.gowork }}" >> "$GITHUB_ENV"

      - name: Build
        run: go build ./...

      - name: Check go.mod tidy
        if: matrix.module == 'hg-mcp'
        run: |
          for dir in dotfiles-mcp hg-mcp mapitall mapping process-mcp systemd-mcp tmux-mcp; do
            echo "Checking $dir..."
            if [ "$dir" = "mapping" ]; then
              (cd "$dir" && GOWORK=off go mod tidy)
            else
              (cd "$dir" && go mod tidy)
            fi
          done
          if ! git diff --exit-code -- '*/go.mod' '*/go.sum'; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' in the affected module(s)."
            exit 1
          fi

  smoke:
    name: MCP Smoke Test
    runs-on: [self-hosted, archglasses, optimized]
    needs: [build]
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: mcp/go.work

      - name: Build server binaries
        run: |
          for srv in dotfiles-mcp process-mcp systemd-mcp tmux-mcp; do
            go build -o "$srv/$srv" "./$srv"
          done

      - name: Smoke test — JSON-RPC initialize
        run: |
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0.0"}}}'
          PASS=0
          FAIL=0

          for srv in dotfiles-mcp process-mcp systemd-mcp tmux-mcp; do
            echo -n "Testing $srv... "
            RESPONSE=$(echo "$INIT" | timeout 10 "./$srv/$srv" 2>/dev/null || true)

            if echo "$RESPONSE" | jq -e '.result.serverInfo.name' > /dev/null 2>&1; then
              NAME=$(echo "$RESPONSE" | jq -r '.result.serverInfo.name')
              echo "OK (name=$NAME)"
              PASS=$((PASS + 1))
            else
              echo "FAIL"
              echo "::error::$srv failed smoke test — no valid initialize response"
              echo "Response: $RESPONSE"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "### MCP Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "$PASS passed, $FAIL failed" >> "$GITHUB_STEP_SUMMARY"

          [ "$FAIL" -eq 0 ] || exit 1
