name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'install.sh'
      - 'home/**'
      - 'docker/**'
      - 'Makefile'
      - '**/*.json'
      - '**/*.toml'
      - '.github/workflows/ci-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'install.sh'
      - 'home/**'
      - 'docker/**'
      - 'Makefile'
      - '**/*.json'
      - '**/*.toml'
      - '.github/workflows/ci-lint.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: scripts
          additional_files: >-
            install.sh
          ignore_paths: >-
            scripts/ccg.sh
            scripts/hypr-monitor-watch.sh
          severity: error

  configs:
    name: Config Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install config validator dependencies
        run: python3 -m pip install --user PyYAML
      - name: Validate tracked config files
        run: bash scripts/validate-config-syntax.sh

  dockerfiles:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Lint Dockerfiles
        run: |
          for f in docker/Dockerfile.*; do
            echo "Linting $f..."
            docker run --rm -i hadolint/hadolint < "$f" || true
          done

  symlinks:
    name: Symlink Targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate install.sh syntax
        run: bash -n install.sh
      - name: Check symlink targets exist
        run: |
          FAIL=0
          while IFS='|' read -r src _; do
            if [ ! -e "$src" ] && [ ! -L "$src" ]; then
              echo "::error::Symlink target missing: $src"
              FAIL=1
            fi
          done < <(bash install.sh --print-link-specs)
          exit "${FAIL:-0}"
      - name: Validate chezmoi source
        run: |
          if command -v chezmoi &>/dev/null; then
            chezmoi verify --source home/ || {
              echo "::error::chezmoi verify failed — managed targets have drifted"
              exit 1
            }
          else
            echo "::warning::chezmoi not installed — skipping verify"
          fi
