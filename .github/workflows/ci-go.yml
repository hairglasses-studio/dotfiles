name: Go CI (Reusable)

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version (default: read from go.mod)"
        type: string
        default: ""
      coverage:
        description: "Enable coverage reporting"
        type: boolean
        default: true
      cross-compile:
        description: "Enable cross-platform build matrix"
        type: boolean
        default: false
      binaries:
        description: "Comma-separated cmd/ paths to build (e.g., cmd/foo,cmd/bar). Empty = go build ./..."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          go-version: ${{ inputs.go-version }}
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          go-version: ${{ inputs.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: inputs.coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Check go.mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        if: inputs.cross-compile

      - uses: actions/setup-go@v5
        if: inputs.cross-compile
        with:
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          go-version: ${{ inputs.go-version }}

      - name: Build
        if: inputs.cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo ci)
          LDFLAGS="-s -w -X main.version=${VERSION}"
          if [ -n "${{ inputs.binaries }}" ]; then
            IFS=',' read -ra BINS <<< "${{ inputs.binaries }}"
            for bin in "${BINS[@]}"; do
              name=$(basename "$bin")
              go build -ldflags "${LDFLAGS}" -o "bin/${name}-${GOOS}-${GOARCH}" "./${bin}"
            done
          else
            go build -ldflags "${LDFLAGS}" ./...
          fi

      - uses: actions/upload-artifact@v7
        if: inputs.cross-compile
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  build-simple:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ !inputs.cross-compile }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          go-version: ${{ inputs.go-version }}
      - name: Build
        run: go build ./...
