name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

concurrency:
  group: claude-security-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  security-review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          trigger_phrase: "@claude-security"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            Focus exclusively on security concerns:
            - Injection vulnerabilities (SQL, command, XSS)
            - Authentication and authorization issues
            - Secret/credential exposure
            - Insecure dependencies
            - Path traversal and file access
            - Race conditions
            Only comment if you find actual security issues. Do not comment on style or general code quality.
