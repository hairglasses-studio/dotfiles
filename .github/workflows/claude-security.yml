name: Claude Security Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

concurrency:
  group: claude-security-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge

      - uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude-security"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            Review pull request #${{ github.event.inputs.pr_number }} for security issues only.

            Focus exclusively on security concerns:
            - Injection vulnerabilities (SQL, command, XSS)
            - Authentication and authorization issues
            - Secret/credential exposure
            - Insecure dependencies
            - Path traversal and file access
            - Race conditions
            Only comment if you find actual security issues. Do not comment on style or general code quality.
