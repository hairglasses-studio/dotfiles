version: 2
updates:
  - package-ecosystem: gomod
    directory: /mcp/dotfiles-mcp
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
