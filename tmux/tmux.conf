# Snazzy-themed tmux config
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse
set -g mouse on

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar — Snazzy palette
set -g status-style "bg=#1a1a1a,fg=#d4d4d4"
set -g status-left "#[fg=#000000,bg=#57c7ff,bold] #S #[fg=#57c7ff,bg=#1a1a1a]"
set -g status-right "#[fg=#686868]%H:%M #[fg=#ff6ac1,bold]#H"
set -g status-left-length 30
setw -g window-status-format " #[fg=#686868]#I:#W "
setw -g window-status-current-format " #[fg=#000000,bg=#ff6ac1,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#686868"
set -g pane-active-border-style "fg=#57c7ff"

# Message styling
set -g message-style "fg=#f3f99d,bg=#1a1a1a"
