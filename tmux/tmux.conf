# Snazzy-themed tmux config
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse
set -g mouse on

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation (prefix + hjkl fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching — vim-tmux-navigator (C-hjkl)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar — Cyberpunk Snazzy
set -g status-style "bg=#000000,fg=#d4d4d4"
set -g status-left-length 40
set -g status-left "#[fg=#000000,bg=#ff6ac1,bold]  #S #[fg=#ff6ac1,bg=#1a1a1a]#[fg=#57c7ff,bg=#1a1a1a] 󰣇 #[fg=#1a1a1a,bg=#000000]"
set -g status-right-length 120
set -g status-right "#[fg=#1a1a1a,bg=#000000]#[fg=#686868,bg=#1a1a1a] 󰍛 #{ram_percentage} #[fg=#282a36]│#[fg=#686868] 󰘚 #{cpu_percentage} #[fg=#282a36]│#[fg=#9aedfe] 󰢮 #(awk '{printf \"%.0f°C\", $1/1000}' /sys/class/drm/card1/device/hwmon/hwmon1/temp1_input 2>/dev/null || echo 'N/A') #[fg=#282a36]│#[fg=#f3f99d]  %H:%M #[fg=#ff6ac1,bg=#1a1a1a]#[fg=#000000,bg=#ff6ac1,bold] #H "
setw -g window-status-format "#[fg=#686868,bg=#000000] #I:#W "
setw -g window-status-current-format "#[fg=#000000,bg=#000000]#[fg=#57c7ff,bg=#1a1a1a]#[fg=#000000,bg=#57c7ff,bold] #I:#W #[fg=#57c7ff,bg=#1a1a1a]#[fg=#1a1a1a,bg=#000000]"
setw -g window-status-separator ""

# Pane borders — neon double lines
set -g pane-border-style "fg=#282a36"
set -g pane-active-border-style "fg=#ff6ac1"
set -g pane-border-lines double

# Message styling
set -g message-style "fg=#f3f99d,bg=#000000,bold"
set -g message-command-style "fg=#57c7ff,bg=#000000"

# Mode styling (copy mode, etc)
setw -g mode-style "fg=#000000,bg=#57c7ff"

# Clock
setw -g clock-mode-colour "#57c7ff"

# ── Session persistence ─────────────────────
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Plugins (TPM) ───────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
