# golangci-lint v2 — shared configuration for hairglasses-studio Go repos.
# Symlink: ln -sf ../../dotfiles/make/golangci.yml .golangci.yml
# Run: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*database/sql.Rows).Close

    govet:
      enable:
        - assign
        - bools
        - buildtag
        - composites
        - copylocks
        - httpresponse
        - nilfunc
        - printf
        - stringintconv
        - tests
        - unmarshal
        - unreachable
        - unusedresult

    gosec:
      excludes:
        - G104         # Unhandled errors — already covered by errcheck
        - G107         # HTTP request with variable URL — standard in MCP tools/clients
        - G115         # Integer overflow on conversion — too noisy, most int conversions are safe
        - G204         # Subprocess with variable args — required by shell-wrapping MCP tools
        - G301         # Directory permissions — 0755 via os.MkdirAll is standard Go idiom
        - G302         # File permissions — 0644 for non-secret files is fine
        - G304         # File path from variable — required by config management tools
        - G306         # Poor file permissions — default os.WriteFile perms are fine
        - G602         # Slice bounds — too many false positives on pre-checked slices

    staticcheck:
      checks:
        - "all"
        - "-SA1019"   # Allow deprecated usage for controlled migration

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
    paths:
      - vendor
      - node_modules
      - dist

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
