name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test
        if: hashFiles('package.json') && contains(toJSON(fromJSON(steps.setup.outputs.cache-matched-key || '{}').scripts || '{}'), 'test')
      - run: npm run lint
        if: hashFiles('package.json') && contains(toJSON(fromJSON(steps.setup.outputs.cache-matched-key || '{}').scripts || '{}'), 'lint')
      - run: npm run build --if-present
