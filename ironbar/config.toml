# Cyberpunk Neon ironbar config
# Primary Hyprland menubar — GTK4, GPU-accelerated
# DP-3 gets two bars: main (top) + keybind ticker (bottom)

icon_theme = "Papirus-Dark"

[ironvar_defaults]
rg_fleet = ""
rg_loops = ""
rg_cost = ""
rg_models = ""
rg_repos = ""
rg_iters = ""
claude_state = ""
claude_cost = ""

# ══════════════════════════════════════════════════
# Samsung ultrawide (DP-3) — two bars
# ══════════════════════════════════════════════════

# ── Bar 1: Main top bar ─────────────────────────
[[monitors."DP-3"]]
position = "top"
height = 28
anchor_to_edges = true
name = "main"

# ── LEFT ──────────────────────────────────────────

[[monitors."DP-3".start]]
type = "workspaces"
all_monitors = false
sort = "added"
favorites = ["1", "2", "3", "4", "5"]

[[monitors."DP-3".start]]
type = "focused"
show_icon = false
show_title = true
truncate.mode = "end"
truncate.max_length = 32

# ── CENTER ────────────────────────────────────────

[[monitors."DP-3".center]]
type = "clock"
format = "%H:%M"
format_popup = "%A %B %d, %Y\n%H:%M:%S"

# ── RIGHT ─────────────────────────────────────────

# Fleet status (ralphglasses)
[[monitors."DP-3".end]]
type = "custom"
class = "bar-fleet"
[[monitors."DP-3".end.bar]]
type = "label"
class = "rg-seg"
label = "{{30000:jq -r '\"\\(.fleet.running // 0)/\\(.fleet.total // 0) 󰑮\"' /tmp/rg-status.json 2>/dev/null || echo ''}}"

[[monitors."DP-3".end.bar]]
type = "label"
class = "rg-seg"
label = "{{30000:jq -r '\"\\(.loops.total_runs // 0) loops\"' /tmp/rg-status.json 2>/dev/null || echo ''}}"

[[monitors."DP-3".end.bar]]
type = "label"
class = "rg-seg rg-cost"
label = "{{30000:jq -r '\"$\\(.cost.total_spend_usd // 0)\"' /tmp/rg-status.json 2>/dev/null || echo ''}}"

# Claude Code session (live push via ironvar)
[[monitors."DP-3".end]]
type = "custom"
class = "bar-claude"
[[monitors."DP-3".end.bar]]
type = "label"
class = "claude-seg"
label = "#claude_state"

[[monitors."DP-3".end.bar]]
type = "label"
class = "claude-seg claude-cost"
label = "#claude_cost"

# Shader indicator
[[monitors."DP-3".end]]
type = "custom"
class = "shader-indicator"
on_click_left = "!$HOME/.local/bin/kitty-shader-playlist next ambient"
on_click_right = "!$HOME/.local/bin/kitty-shader-playlist random"
bar = [
  { type = "label", label = " {{10000:cat ~/.local/state/kitty-shaders/current-label 2>/dev/null || cat ~/.local/state/kitty-shaders/current 2>/dev/null | sed 's/\\.glsl$//' || echo 'none'}}" },
]

# MPRIS media
[[monitors."DP-3".end]]
type = "music"
player_type = "mpris"
format = "{icon} {title} — {artist}"
truncate.mode = "end"
truncate.max_length = 22
icons.playing = ""
icons.paused = ""

# Cava audio bars (text-based, Unicode block chars)
[[monitors."DP-3".end]]
type = "script"
class = "bar-cava"
mode = "watch"
cmd = "$HOME/hairglasses-studio/dotfiles/scripts/ironbar-cava.sh"

# System metrics
[[monitors."DP-3".end]]
type = "sys_info"
format = [" {cpu_percent}%", " {temp_c:k10temp-Tctl}°", " {memory_percent}%"]
interval.cpu = 3
interval.temps = 5
interval.memory = 5

# GPU power
[[monitors."DP-3".end]]
type = "label"
class = "bar-gpu"
label = "{{10000:nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits 2>/dev/null | awk '{printf \"%.0fW\", $1}' || echo ''}}"

# Bluetooth
[[monitors."DP-3".end]]
type = "label"
class = "bar-bt"
label = "{{10000:n=$(bluetoothctl devices Connected 2>/dev/null | wc -l); [ \"$n\" -gt 0 ] && echo \"󰂯 $n\" || echo ''}}"

# Updates (cache-fed via bar-updates.timer — avoids pacman network I/O on GTK thread)
[[monitors."DP-3".end]]
type = "label"
class = "bar-updates"
label = "{{300000:cat /tmp/bar-updates.txt 2>/dev/null || echo ''}}"
on_click_left = "!$HOME/.local/bin/kitty-visual-launch -e yay"

# MX mouse battery (cache-fed via bar-mx.timer — avoids bluetoothctl IPC on GTK thread)
[[monitors."DP-3".end]]
type = "label"
class = "bar-mx"
label = "{{60000:cat /tmp/bar-mx.txt 2>/dev/null || echo ''}}"

# Volume
[[monitors."DP-3".end]]
type = "volume"
format = "{icon} {percentage}%"
max_volume = 100
icons.volume_high = "󰕾"
icons.volume_medium = "󰖀"
icons.volume_low = "󰕿"
icons.muted = "󰝟"

# Weather (cache-fed via bar-weather.timer — avoids network I/O on GTK thread)
[[monitors."DP-3".end]]
type = "label"
class = "bar-weather"
label = "{{300000:cat /tmp/bar-weather.txt 2>/dev/null || echo ''}}"

# Network
[[monitors."DP-3".end]]
type = "label"
class = "bar-net"
label = "{{5000: ip -j route get 1.1.1.1 2>/dev/null | jq -r '.[0].dev // \"none\"'}}"
on_click_left = "!$HOME/.local/bin/kitty-visual-launch -e nmtui"

# System tray
[[monitors."DP-3".end]]
type = "tray"
icon_size = 18
direction = "horizontal"


# ══════════════════════════════════════════════════
# XEC portrait (DP-2) — single compact bar
# ══════════════════════════════════════════════════

[monitors."DP-2"]

[[monitors."DP-2".start]]
type = "workspaces"
all_monitors = false
sort = "added"

[[monitors."DP-2".start]]
type = "focused"
show_icon = false
show_title = true
truncate.mode = "end"
truncate.max_length = 18

[[monitors."DP-2".center]]
type = "clock"
format = "%H:%M"
format_popup = "%A %B %d, %Y\n%H:%M:%S"

[[monitors."DP-2".end]]
type = "network_manager"

[[monitors."DP-2".end]]
type = "volume"
format = "{icon} {percentage}%"
max_volume = 100
icons.volume_high = "󰕾"
icons.volume_medium = "󰖀"
icons.volume_low = "󰕿"
icons.muted = "󰝟"
