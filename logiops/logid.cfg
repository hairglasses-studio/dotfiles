devices: (
  {
    name: "MX Master 4";
    dpi: 4000;
    smartshift: {
      on: true;
      threshold: 15;
      // torque managed by Solaar (dotfiles/solaar/config.yaml) — do not set here
    };
    hiresscroll: {
      hires: true;
      invert: false;
      target: false;
    };
    buttons: (
      {
        cid: 0x0c3;
        action: {
          type: "Gestures";
          gestures: (
            {
              direction: "Up";
              mode: "OnRelease";
              action: { type: "Keypress"; keys: ["KEY_VOLUMEUP"]; };
            },
            {
              direction: "Down";
              mode: "OnRelease";
              action: { type: "Keypress"; keys: ["KEY_VOLUMEDOWN"]; };
            },
            {
              direction: "Left";
              mode: "OnRelease";
              action: { type: "Keypress"; keys: ["KEY_PREVIOUSSONG"]; };
            },
            {
              direction: "Right";
              mode: "OnRelease";
              action: { type: "Keypress"; keys: ["KEY_NEXTSONG"]; };
            },
            {
              direction: "None";
              mode: "OnRelease";
              action: { type: "Keypress"; keys: ["KEY_PLAYPAUSE"]; };
            }
          );
        };
      },
      {
        cid: 0x0c4;
        action: { type: "ToggleSmartShift"; };
      }
      // Back/forward buttons (0x053, 0x056) handled by makima for per-app remapping
    );
  }
);