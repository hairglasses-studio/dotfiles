# Browsers, photo/video, media servers, email, documents
[arch]
packages = [
    # Photography
    { name = "darktable" },
    { name = "digikam" },
    { name = "rapid-photo-downloader" },
    { name = "imv" },

    # Video
    { name = "ffmpeg" },
    { name = "vlc" },
    { name = "celluloid" },
    { name = "yt-dlp" },

    # Audio
    { name = "cava" },

    # Media server
    { name = "jellyfin-server" },
    { name = "jellyfin-web" },

    # Cloud storage
    # megacmd-bin disabled: upstream URL (mega.nz/linux/repo/Arch_Extra/.../megacmd-2.5.1-1) 404s as of 2026-04-21
    { name = "megasync-bin" },

    # Document tools
    { name = "zathura" },
    { name = "zathura-pdf-poppler" },
    { name = "glow" },
    { name = "pandoc-cli" },
    { name = "texlive-basic" },
    { name = "texlive-fontsrecommended" },
    { name = "texlive-latexextra" },
    { name = "texlive-latexrecommended" },

    # Browsers
    { name = "firefox" },
    { name = "google-chrome" },
    { name = "opera" },

    # Email/PIM
    { name = "aerc" },
    { name = "himalaya" },
    { name = "hledger" },
    { name = "hledger-ui-bin" },

    # GStreamer
    { name = "gst-libav" },
    { name = "gst-plugins-bad" },
    { name = "gst-plugins-good" },
    { name = "gst-plugins-ugly" },

    # GVFS
    { name = "gvfs" },
    { name = "gvfs-mtp" },

    # OCR
    { name = "tesseract" },
    { name = "tesseract-data-eng" },

    # Communication
    { name = "telegram-desktop" },

    # Android
    { name = "android-tools" },
    { name = "android-udev" },
    { name = "scrcpy" },
    { name = "python-pyamlboot-git" },
    { name = "aml-flash-tool" },
    { name = "ampack-git" },
]
