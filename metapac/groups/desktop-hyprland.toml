# Desktop environment: Hyprland + eww + hyprshell + hypr-dock + swaync
[arch]
packages = [
    # Hyprland core
    { name = "hyprland" },
    { name = "hy3" },
    { name = "hypridle" },
    { name = "hyprlock" },
    { name = "hyprpaper" },
    { name = "hyprpicker" },
    { name = "hyprsunset" },
    { name = "hyprshade" },
    { name = "hyprdynamicmonitors-bin" },
    { name = "hyprland-autoname-workspaces-git" },
    { name = "pyprland" },
    { name = "xdg-desktop-portal-hyprland" },
    { name = "xdg-desktop-portal-gtk" },
    { name = "xorg-xwayland" },
    { name = "xdg-user-dirs" },
    { name = "xdg-terminal-exec" },

    # Bar & widgets
    { name = "eww" },
    { name = "hypr-dock" },

    # Notifications
    { name = "swaync" },
    { name = "poweralertd" },

    # Launcher & session
    { name = "hyprshell-bin" },
    { name = "wofi" },
    { name = "wofi-emoji" },
    { name = "wlogout" },
    { name = "greetd" },
    { name = "greetd-tuigreet" },
    { name = "gtklock" },
    { name = "dex" },

    # Wayland tools
    { name = "wl-clipboard" },
    { name = "wl-clip-persist" },
    { name = "wl-gammactl-gettext" },
    { name = "wl-screenrec" },
    { name = "wlsunset" },
    { name = "wluma" },
    { name = "wayshot" },
    { name = "slurp" },
    { name = "satty" },
    { name = "swappy" },
    { name = "swayosd" },
    { name = "swww" },
    { name = "wdisplays" },
    { name = "wev" },
    { name = "wf-recorder" },
    { name = "grim-hyprland-git" },
    { name = "ydotool" },
    { name = "wtype" },
    { name = "flashfocus" },
    { name = "socat" },
    { name = "tesseract" },
    { name = "imagemagick" },

    # Clipboard
    { name = "cliphist" },
    { name = "clipse-wayland-bin" },

    # Wallpaper & theme
    { name = "wallust" },
    { name = "matugen" },
    { name = "mpvpaper" },
    { name = "shaderbg" },

    # GTK/Qt theming
    { name = "gtk3-nocsd" },
    { name = "kvantum" },
    { name = "breeze" },
    { name = "breeze-gtk" },
    { name = "breeze5" },
    { name = "kde-gtk-config" },
    { name = "plasma-integration" },
    { name = "plasma5-integration" },
    { name = "plasma-workspace" },
    { name = "systemsettings" },
    { name = "qt5-wayland" },
    { name = "qt5ct" },
    { name = "qt6-wayland" },
    { name = "qt6ct" },
    { name = "qt6-imageformats" },
    { name = "papirus-icon-theme" },
    { name = "bibata-cursor-theme" },
    { name = "xdg-desktop-portal-kde" },
    { name = "xsettingsd" },

    # Polkit
    { name = "polkit-gnome" },

    # Audio
    { name = "pavucontrol" },
    { name = "pulsemixer" },
    { name = "playerctl" },
    { name = "brightnessctl" },
]
