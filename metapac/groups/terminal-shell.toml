# Terminal emulators, shell, prompt, multiplexer
[arch]
packages = [
    # Terminals
    { name = "ghostty", hooks = { after_sync = ["systemctl", "--user", "enable", "shader-rotate.timer"] } },
    { name = "ghostty-shell-integration" },
    { name = "ghostty-terminfo" },
    { name = "foot" },

    # Shell
    { name = "oh-my-zsh" },

    # Prompt & history
    { name = "starship" },
    { name = "atuin" },
    { name = "zoxide" },

    # Multiplexer
    { name = "tmux", hooks = { after_sync = ["systemctl", "--user", "enable", "tmux.service"] } },
    { name = "zellij" },

    # Terminal effects
    { name = "terminaltexteffects-git" },
]
