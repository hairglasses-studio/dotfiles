# ── rEFInd Boot Manager — Cyberpunk Config ──────────
# Install: sudo cp refind.conf /boot/efi/EFI/refind/refind.conf

# ── Timeouts ─────────────────────────────────────────
# 5 seconds to select, then boot default (Manjaro)
timeout 5
screensaver 300

# ── UI Options ───────────────────────────────────────
# Show labels so entries are identifiable
hideui singleuser,arrows,badges

# Use graphical boot for clean NVIDIA handoff
use_graphics_for osx,linux,windows,grub

# Scan internal disks + manual stanzas + external/optical
# Internal scan ensures GRUB and Windows are always visible as fallbacks
scanfor internal,manual,external,optical

# Suppress auto-detected entries that duplicate our manual stanzas
dont_scan_files vmlinuz-6.12-x86_64,vmlinuz-6.1-x86_64

# ── Resolution ───────────────────────────────────────
# Explicit resolution (avoid 'max' — NVIDIA GOP may not support native res)
resolution 1920 1080

# ── Default OS ───────────────────────────────────────
# Boot Manjaro by default
default_selection "Manjaro"

# ── NVIDIA ───────────────────────────────────────────
# Enable graphics console for NVIDIA
enable_touch
enable_mouse

# ── Kernel version strings (Manjaro-specific) ────────
extra_kernel_version_strings linux612,linux61,linux-lts,linux

# ── Manual Boot Stanzas ─────────────────────────────

# Manjaro Linux (default)
menuentry "Manjaro Linux" {
    icon     /EFI/refind/themes/matrix/icons/os_manjaro.png
    volume   "42fe0f68-6e5c-4b54-bc52-4b2aadef5e60"
    loader   /@/boot/vmlinuz-6.12-x86_64
    initrd   /@/boot/initramfs-6.12-x86_64.img
    options  "root=UUID=42fe0f68-6e5c-4b54-bc52-4b2aadef5e60 rw rootflags=subvol=@ quiet splash loglevel=3 nvidia_drm.modeset=1 nvidia.NVreg_PreserveVideoMemoryAllocations=1 apparmor=1 security=apparmor udev.log_priority=3 nmi_watchdog=0 nowatchdog preempt=full"
    submenuentry "Boot to terminal (single-user)" {
        add_options "single"
    }
}

# Manjaro Linux — LTS kernel fallback
menuentry "Manjaro Linux (6.1 LTS)" {
    icon     /EFI/refind/themes/matrix/icons/os_manjaro.png
    volume   "42fe0f68-6e5c-4b54-bc52-4b2aadef5e60"
    loader   /@/boot/vmlinuz-6.1-x86_64
    initrd   /@/boot/initramfs-6.1-x86_64.img
    options  "root=UUID=42fe0f68-6e5c-4b54-bc52-4b2aadef5e60 rw rootflags=subvol=@ quiet splash loglevel=3 nvidia_drm.modeset=1 nvidia.NVreg_PreserveVideoMemoryAllocations=1 apparmor=1 security=apparmor udev.log_priority=3 nmi_watchdog=0 nowatchdog preempt=full"
    submenuentry "Boot to terminal (single-user)" {
        add_options "single"
    }
}

# Windows 11 (secondary)
menuentry "Windows 11" {
    icon     /EFI/refind/themes/matrix/icons/os_win.png
    loader   /EFI/Microsoft/Boot/bootmgfw.efi
}

# GRUB chain-load (emergency fallback — hidden by default)
menuentry "GRUB (fallback)" {
    icon     /EFI/refind/themes/matrix/icons/tool_firmware.png
    loader   /EFI/Manjaro/grubx64.efi
    disabled
}

# ── Tools ────────────────────────────────────────────
showtools shutdown,reboot,firmware,hidden_tags

# ── Theme ────────────────────────────────────────────
include themes/matrix/theme.conf
