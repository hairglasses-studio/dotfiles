# Matrix rEFInd theme — fixed paths for our install

# UI elements
hideui badges,arrows,hints

# Icons and background
icons_dir themes/matrix/icons
banner themes/matrix/background.png
banner_scale fillscreen

# Icon sizes
small_icon_size 56
big_icon_size 256

# Selection highlights
selection_big   themes/matrix/selection_big.png
selection_small themes/matrix/selection_small.png

# Clean graphical boot
use_graphics_for osx,linux,elilo,grub,windows

# Tools row
showtools shutdown,reboot,firmware,hidden_tags
