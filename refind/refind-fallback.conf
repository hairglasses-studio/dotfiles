# rEFInd fallback config — deployed to /boot/efi/EFI/Boot/
# Minimal config for recovery situations (manual stanzas only, no auto-scan)
resolution 2560 1440
timeout 10
scanfor manual,external
include themes/matrix/theme.conf
default_selection "Manjaro"

menuentry "Manjaro Linux" {
    volume   "42fe0f68-6e5c-4b54-bc52-4b2aadef5e60"
    loader   /@/boot/vmlinuz-6.12-x86_64
    initrd   /@/boot/initramfs-6.12-x86_64.img
    options  "root=UUID=42fe0f68-6e5c-4b54-bc52-4b2aadef5e60 rw rootflags=subvol=@ quiet"
}

menuentry "Windows 11" {
    loader   /EFI/Microsoft/Boot/bootmgfw.efi
}
