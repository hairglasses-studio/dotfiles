# dev-console-overrides.conf — kitty config layered on top of kitty.conf
# for the Mod+` dropdown console. Loaded via:
#   kitty --class=dev-console --config <this-file> ...
#
# The `include` directive pulls in the full kitty.conf first so themes,
# keybinds, watchers, symbol_map, etc. all still apply. Subsequent settings
# override the included values.

include /home/hg/.config/kitty/kitty.conf

# ── Font ───────────────────────────────────────────────────────
# Monaspace Krypton — geometric/mechanical variant, flat-topped glyphs;
# distinctly cyberpunk-HUD feel. Pairs with the holo-shimmer shader.
font_family      Monaspace Krypton
bold_font        Monaspace Krypton Bold
italic_font      Monaspace Krypton Italic
bold_italic_font Monaspace Krypton Bold Italic

# ── Chrome ─────────────────────────────────────────────────────
# Hide tab bar entirely — single-purpose dropdown, the powerline tab bar
# is wasted real estate and clutters the HUD feel.
tab_bar_style hidden

# Slightly more see-through so the per-window shader (holo-shimmer et al.)
# reads more distinctly against the desktop behind; blur compensates.
background_opacity 0.85
background_blur 2

# Roomier padding than global 2,4,2,4 — the 90%-wide dropdown has plenty
# of canvas, and extra margin makes the window feel less cramped at the
# gradient border.
window_padding_width 8 16 8 16

# ── Hacker HUD chrome ─────────────────────────────────────────
# Neon cyan selection inverts to void-black text — reads like a HUD
# callout rather than a default muted highlight.
selection_background #29f0ff
selection_foreground #05070d

# Neon-green URL underline — sits distinct from the cyan selection.
url_color #3dffb5

# Magenta bell flash — border + inner both pulse on visual bell.
visual_bell_color #ff47d1
bell_border_color #ff47d1

# Persistent CYBERNET watermark in the bottom-right corner. The plymouth
# logo is 600×80 (~7.5:1 aspect) so keep scale + alpha low — the goal is
# atmospheric branding, not foreground content.
window_logo_path     /home/hg/hairglasses-studio/dotfiles/plymouth/cybernet/logo.png
window_logo_position bottom-right
window_logo_scale    20
window_logo_alpha    0.12
