# ╔═══════════════════════════════════════════════════════════════╗
# ║              KITTY — Cyberpunk Neon Rice                      ║
# ║              hairglasses-studio/dotfiles                      ║
# ╚═══════════════════════════════════════════════════════════════╝

include cyberpunk-neon.conf

# ── Font ───────────────────────────────────────────────────────
# Monaspace families are metrics-compatible, but Kitty can only mix them per
# face rather than semantically per line. Keep the base config on one family
# and drive ligatures/features explicitly.
font_family      Monaspace Neon
bold_font        Monaspace Neon Bold
italic_font      Monaspace Neon Italic
bold_italic_font Monaspace Neon Bold Italic
font_size 7.8

font_features MonaspaceNeon-Regular     +calt +liga +case +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10
font_features MonaspaceNeon-Bold        +calt +liga +case +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10
font_features MonaspaceNeon-Italic      +calt +liga +case +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10
font_features MonaspaceNeon-BoldItalic  +calt +liga +case +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10

# Use Kitty's bundled Nerd symbols instead of depending on patched primary fonts.
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

disable_ligatures never
modify_font cell_height 0px
modify_font cell_width 1px

# ── Cursor ─────────────────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0

# Cyberpunk glow trail on cursor movement
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# ── Scrollback ─────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 5.0

# ── Mouse ──────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select clipboard
detect_urls yes
url_style curly
open_url_with default
select_by_word_characters @-./_~?&=%+#
strip_trailing_spaces smart

# ── Performance ────────────────────────────────────────────────
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ── Bell ───────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab " 🔔"

# ── Window ─────────────────────────────────────────────────────
remember_window_size no
window_padding_width 10 14 10 14
draw_minimal_borders yes
window_border_width 1.5pt
hide_window_decorations yes
placement_strategy center
confirm_os_window_close -1

# ── Background / Glass ────────────────────────────────────────
background_opacity 0.95
dynamic_background_opacity yes
background_blur 2
dim_opacity 0.75

# ── Tab bar — Powerline rice ──────────────────────────────────
tab_bar_edge top
tab_bar_margin_width 4.0
tab_bar_margin_height 2.0 4.0
tab_bar_style powerline
tab_powerline_style angled
tab_bar_align left
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_activity_symbol " "
tab_title_max_length 25
tab_title_template " {fmt.fg.cyan}{index}{fmt.fg.tab} {title} "
active_tab_title_template " {fmt.fg.magenta}{index}{fmt.fg.tab} {title} "
active_tab_font_style bold
inactive_tab_font_style normal

# ── Layouts ────────────────────────────────────────────────────
enabled_layouts splits,tall,stack

# ── Advanced ───────────────────────────────────────────────────
shell zsh
editor nvim
close_on_child_death no
allow_remote_control yes
listen_on unix:@mykitty
watcher watchers/random_theme.py
update_check_interval 0
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 512
allow_hyperlinks yes
shell_integration enabled
term xterm-kitty
linux_display_server wayland
wayland_titlebar_color background

# ── Splits (match Ghostty layout) ─────────────────────────────
map super+d launch --location=vsplit --cwd=current
map super+shift+d launch --location=hsplit --cwd=current
map super+alt+left neighboring_window left
map super+alt+right neighboring_window right
map super+alt+up neighboring_window up
map super+alt+down neighboring_window down

# ── Tabs ───────────────────────────────────────────────────────
map super+shift+[ previous_tab
map super+shift+] next_tab
map super+t new_tab_with_cwd
map super+shift+w close_tab
map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9

# ── Clipboard ──────────────────────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+shift+v paste_from_selection
mouse_map right press ungrabbed paste_from_clipboard

# ── Window ─────────────────────────────────────────────────────
map super+enter toggle_fullscreen

# ── Scrollback ─────────────────────────────────────────────────
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+h show_scrollback
map ctrl+shift+g show_last_command_output

# ── Font size ──────────────────────────────────────────────────
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+0 change_font_size all 0

# ── Layout ─────────────────────────────────────────────────────
map super+shift+l next_layout
map super+shift+z toggle_layout stack

# ── Kittens ────────────────────────────────────────────────────
map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -
map ctrl+shift+u kitten unicode_input

# ── Misc ───────────────────────────────────────────────────────
map ctrl+shift+f2 edit_config_file
map ctrl+shift+f5 load_config_file
map ctrl+shift+escape kitty_shell window
map ctrl+shift+delete clear_terminal reset active

# ── Local overrides ────────────────────────────────────────────
globinclude kitty.local.conf
