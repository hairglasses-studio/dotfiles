# Optional Kitty extras installed by:
#   bash ~/hairglasses-studio/dotfiles/scripts/kitty-extras-sync.sh
#
# Uncomment these mappings after syncing the upstream repos into
# ~/.config/kitty/extras/.
#
# Smart scroll:
# map shift+up        kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_line_up   shift+up
# map shift+down      kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_line_down shift+down
# map shift+page_up   kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_page_up   shift+page_up
# map shift+page_down kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_page_down shift+page_down
# map ctrl+shift+home kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_home      ctrl+shift+home
# map ctrl+shift+end  kitten ~/.config/kitty/extras/kitty-smart-scroll/smart_scroll.py scroll_end       ctrl+shift+end
#
# Kitty session restore:
#   ~/.config/kitty/extras/kitty-save-session/kitty-save-session-restore-all.sh
# Optional save-session timer units are shipped in systemd/ and can be enabled
# manually once the upstream scripts are present. The repo keeps
# startup_session set to none in kitty.conf, so session restore remains opt-in
# and does not change the default shell-first terminal path.
