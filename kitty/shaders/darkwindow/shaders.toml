# shaders.toml — DarkWindow shader manifest
# Generated from in-file header comments + kitty/shaders/playlists/*.txt
# Schema (ShaderMeta in mcp/dotfiles-mcp/mod_shader.go):
#   category     — one of: CRT, Post-FX, Cursor, Cyberpunk, Watercolor, Background
#   cost         — tier classification: LOW (tier-cheap) / MED (tier-mid) / HIGH (tier-heavy)
#   source       — upstream URL (gist, shadertoy, github) if known
#   description  — one-line human summary
#   playlists    — non-tier playlist membership (ambient, best-of, crt, ...)
#
# Section headers are quoted to satisfy the awk parser in
# kitty/shaders/bin/shader-meta.sh: /^\[shaders\."/
#
# Author attribution is carried in the .glsl header (`// Shader attribution: <author>`)
# and surfaced here alongside the schema fields declared in Go.


