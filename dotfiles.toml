# ── Dotfiles Feature Flags ────────────────────────
# Toggle components on/off. Run: ./manjaro/install.sh
# Profiles: ./manjaro/install.sh --profile minimal|dev|full|cyberpunk

[meta]
profile = "cyberpunk"

# ── Core (shell, editor, git) ────────────────────
[core]
zsh = true
git = true
ssh = true
starship = true
tmux = true
nvim = true

# ── Terminal emulators & tools ───────────────────
[terminal]
kitty = true
bat = true
fastfetch = true
macchina = true
kitty_smart_scroll = true
kitty_save_session = true
kitty_scrollback = true

# ── Desktop (Linux — Hyprland) ─
[desktop.linux]
hyprland = true
quickshell = true
hyprdynamicmonitors = true
hyprland_autoname_workspaces = true
mpvpaper = true
waydeeper = true
wofi = true
wlogout = true
hyprshade = true
wluma = true
kanshi = true
hyprlax = true
hyprchroma = true

# ── Desktop (macOS) ──────────────────────────────
[desktop.macos]
aerospace = true
sketchybar = true
borders = true
retrovisor = true
tattoy = true

# ── TUI theming ──────────────────────────────────
[theming]
gtk = true
btop = true
cava = true
yazi = true
lazygit = true
k9s = true
glow = true
gh = true

# ── Visual effects ───────────────────────────────
[visual]
kitty-shaders = true
wallpaper-shaders = true
refind = false          # Manual deploy (needs sudo for EFI)
plymouth = false        # Manual deploy (needs mkinitcpio rebuild)

# ── Keyboard firmware ────────────────────────────
[keyboard]
keychron-v1-ultra = false   # Manual flash via Keychron Launcher
drop-ctrl = false           # Manual flash via VIA

# ── MCP servers (separate repos, binaries) ───────
[mcp]
dotfiles-mcp = true

# ── Profiles ─────────────────────────────────────
# Use: ./manjaro/install.sh --profile <name>

[profiles.minimal]
enable = ["zsh", "git", "ssh", "starship", "nvim"]

[profiles.dev]
enable = ["zsh", "git", "ssh", "starship", "nvim", "tmux", "lazygit", "gh", "bat", "fastfetch", "kitty", "kitty-shaders"]

[profiles.full]
enable = ["*"]

[profiles.cyberpunk]
enable = ["*"]
