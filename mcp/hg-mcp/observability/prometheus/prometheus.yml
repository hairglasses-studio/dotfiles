global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OTEL Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # OTEL Collector exported metrics (from hg-mcp)
  - job_name: 'hg-mcp'
    static_configs:
      - targets: ['otel-collector:8889']

  # Direct scrape of hg-mcp metrics endpoint (when running locally)
  - job_name: 'hg-mcp-direct'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: /metrics
