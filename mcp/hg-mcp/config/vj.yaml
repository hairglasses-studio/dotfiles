# VJ Configuration
# Multi-user VJ settings for Resolume Arena sync and control

# VJ User Profiles
users:
  - username: hairglasses
    display_name: Hairglasses
    # VJ packs this user syncs by default
    default_packs:
      - hackerglasses
      - hairglasses
      - masks
      - algorave
    # Full pack sync (for machines with enough space)
    full_packs:
      - hackerglasses
      - hairglasses
      - fetz
      - masks
      - algorave
      - relic
      - mantissa
      - tricky
      - church
      - footage
    # Resolume preferences
    resolume:
      default_bpm: 128
      master_level: 100
      output_resolution: "1920x1080"
    # Machine-specific settings
    machines:
      baeblade:  # Windows VJ laptop, 4TB drive
        disk_margin_gb: 100
        sync_mode: full
        media_path: "C:\\Users\\Mitch\\Documents\\Resolume Arena\\Media"
      macbook:  # MacBook, 500GB drive
        disk_margin_gb: 50
        sync_mode: essential
        media_path: "~/Documents/Resolume Arena/Media"

  - username: luke-lasley
    display_name: Luke
    default_packs:
      - hackerglasses
      - masks
    full_packs:
      - hackerglasses
      - hairglasses
      - masks
      - algorave
    resolume:
      default_bpm: 140
      master_level: 100
      output_resolution: "1920x1080"
    machines:
      default:
        disk_margin_gb: 50
        sync_mode: essential
        media_path: "~/Documents/Resolume Arena/Media"

# VJ Pack Definitions
packs:
  hackerglasses:
    folder: HACKERGLASSES
    description: "Hacker-themed visuals"
    priority: essential
    estimated_size_gb: 0.5

  hairglasses:
    folder: "Hairglasses Visuals"
    description: "Main Hairglasses visual pack"
    priority: essential
    estimated_size_gb: 50

  fetz:
    folder: "Fetz VJ Storage"
    description: "Fetz visual collection"
    priority: full
    estimated_size_gb: 100

  masks:
    folder: Masks
    description: "Visual masks and overlays"
    priority: essential
    estimated_size_gb: 2

  algorave:
    folder: Algorave
    description: "Algorave/livecoding visuals"
    priority: essential
    estimated_size_gb: 1

  relic:
    folder: "Relic VJ Clips"
    description: "Relic visual collection"
    priority: full
    estimated_size_gb: 200

  mantissa:
    folder: Mantissa
    description: "Mantissa visuals"
    priority: full
    estimated_size_gb: 100

  tricky:
    folder: "TrickyFM Visuals"
    description: "TrickyFM visual pack"
    priority: full
    estimated_size_gb: 50

  church:
    folder: "Hairglasses at Church"
    description: "Church performance recordings"
    priority: full
    estimated_size_gb: 100

  footage:
    folder: "Hairglasses Footage"
    description: "Raw footage collection"
    priority: full
    estimated_size_gb: 200

# Sync Settings
sync:
  gdrive_base: "gdrive:Video/VJ Tools (Laptop Salvage)/DXV3 1080p HQ Clips"
  local_base: "~/Documents/Resolume Arena/Media"

  # rclone settings for optimal large file sync
  rclone:
    transfers: 8
    checkers: 16
    buffer_size: "256M"
    drive_chunk_size: "128M"

  # Disk space thresholds (GB)
  disk_thresholds:
    full_sync: 3500      # Sync all packs
    standard_sync: 200   # Sync essential packs
    minimal_sync: 50     # Sync core packs only
    warning: 25          # Low space warning

# VJ Clip Zip Packs (downloadable archives)
