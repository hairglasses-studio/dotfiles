# Music Sync Configuration
# This file configures the music-sync pipeline

# User configurations
users:
  - username: hairglasses
    display_name: Hairglasses
    soundcloud: true
    beatport: true
    playlists: []  # Empty = sync all discovered playlists

  - username: freaq-show
    display_name: FreaQShoW
    soundcloud: true
    beatport: false
    playlists: []

  - username: luke-lasley
    display_name: Luke
    soundcloud: true
    beatport: false
    playlists: []

  - username: fogel
    display_name: Fogel
    soundcloud: true
    beatport: false
    playlists: []

  - username: rahul
    display_name: Rahul
    soundcloud: true
    beatport: false
    playlists: []

  - username: aidan
    display_name: Aidan
    soundcloud: true
    beatport: false
    playlists: []

  - username: marissughdevelops
    display_name: Marissa
    soundcloud: true
    beatport: false
    playlists: []

# Service configurations
services:
  soundcloud:
    enabled: true
    timeout: 10m
    rate_limit:
      requests_per_minute: 60
      burst_size: 10
    retry:
      max_retries: 3
      initial_delay: 1s
      max_delay: 30s

  beatport:
    enabled: true
    timeout: 15m
    workers: 3
    rate_limit:
      requests_per_minute: 30
      burst_size: 5
    retry:
      max_retries: 3
      initial_delay: 2s
      max_delay: 60s

  rekordbox:
    enabled: true
    timeout: 5m
    retry:
      max_retries: 2
      initial_delay: 5s
      max_delay: 30s

# Storage configuration
storage:
  # Backend: "local" or "aws" (DynamoDB)
  backend: aws
  local_root: ~/Music
  s3_bucket: cr8-music-storage
  aws_profile: cr8
  aws_region: us-east-1
  # Local fallback (used when backend=local)
  state_file: ~/.cache/aftrs/sync-state.json
  # DynamoDB tables (used when backend=aws)
  dynamodb:
    sync_state_table: cr8_sync_state
    playlists_table: cr8_playlists
    sync_queue_table: cr8_sync_queue
    sync_history_table: cr8_sync_history

# Monitoring configuration
monitoring:
  metrics_port: 9091
  health_check_interval: 30s

# Logging configuration
logging:
  level: info  # debug, info, warn, error
  format: text  # text, json
