name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, archglasses, optimized]
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -count=1 -race -timeout 10m
      - run: go build ./...
