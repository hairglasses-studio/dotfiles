<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>allthelinks</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --dim: #888;
    --accent: #6be5a0;
    --accent-dim: #3a7a5a;
    --link: #82b1ff;
    --sold: #ffab40;
    --tag-gpu: #bb86fc;
    --tag-ram: #64b5f6;
    --tag-price: #6be5a0;
    --tag-warn: #ff8a65;
    --surface-hover: #222;
    --danger: #ef5350;
    --radius: 6px;
    --transition: 0.15s ease;
    --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
    --modal-backdrop: rgba(0, 0, 0, 0.6);
    --max-width: 960px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    max-width: var(--max-width);
    margin: 0 auto;
    line-height: 1.5;
    animation: fade-in 0.3s ease;
  }

  /* --- Header --- */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .header-left { display: flex; align-items: baseline; gap: 1rem; }
  .header-right { display: flex; gap: 0.5rem; }
  .site-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
  }
  .clock {
    font-size: 1.1rem;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    font-weight: 300;
  }

  /* --- Search --- */
  .search-input {
    width: 100%;
    padding: 0.6rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    outline: none;
    transition: border-color var(--transition);
  }
  .search-input:focus { border-color: var(--accent-dim); }
  .search-input::placeholder { color: var(--dim); }

  /* --- Groups grid --- */
  #groups {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  #groups.cols-2 {
    grid-template-columns: repeat(2, 1fr);
  }
  @media (max-width: 700px) {
    #groups.cols-2 { grid-template-columns: 1fr; }
  }

  /* --- Group card --- */
  .group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-dim);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color var(--transition);
  }
  .group:nth-child(6n+1) { border-left-color: #6be5a0; }
  .group:nth-child(6n+2) { border-left-color: #82b1ff; }
  .group:nth-child(6n+3) { border-left-color: #bb86fc; }
  .group:nth-child(6n+4) { border-left-color: #64b5f6; }
  .group:nth-child(6n+5) { border-left-color: #ff8a65; }
  .group:nth-child(6n+6) { border-left-color: #ffab40; }
  .group:hover { border-color: var(--accent-dim); }
  .group-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    cursor: pointer;
    user-select: none;
  }
  .group-collapse {
    background: none; border: none; color: var(--dim);
    font-size: 0.8rem; cursor: pointer; padding: 0;
    transition: transform var(--transition);
    line-height: 1;
  }
  .group.collapsed .group-collapse { transform: rotate(0deg); }
  .group:not(.collapsed) .group-collapse { transform: rotate(90deg); }
  .group-icon { font-size: 1.1rem; }
  .group-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .group-actions {
    display: flex; gap: 0.25rem;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .group-header:hover .group-actions { opacity: 1; }
  .group-body {
    padding: 0 1rem 0.75rem;
    max-height: 2000px;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    opacity: 1;
  }
  .group.collapsed .group-body {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
  }

  /* --- Link card --- */
  .link-card {
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
    transition: transform var(--transition);
  }
  .link-card:hover { transform: translateX(2px); }
  .link-card:last-child { border-bottom: none; }
  .link-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.35rem;
  }
  .link-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .link-actions {
    display: flex; gap: 0.25rem;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .link-card:hover .link-actions { opacity: 1; }
  .link-urls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 0.4rem;
  }
  .link-urls a {
    font-size: 0.8rem;
    color: var(--link);
    text-decoration: none;
  }
  .link-urls a:hover { text-decoration: underline; }
  .link-urls a.sold { color: var(--sold); }
  .link-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.4rem;
  }
  .tag {
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    background: #222;
    border: 1px solid #333;
    transition: transform var(--transition);
  }
  .tag:hover { transform: scale(1.05); }
  .link-note {
    font-size: 0.75rem;
    color: var(--dim);
  }

  /* --- Buttons --- */
  .btn-icon {
    background: none; border: none;
    color: var(--dim); cursor: pointer;
    font-size: 0.85rem; padding: 0.2rem 0.4rem;
    border-radius: 3px;
    transition: color var(--transition), background var(--transition);
  }
  .btn-icon:hover { color: var(--text); background: var(--border); }
  .btn {
    padding: 0.4rem 0.8rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color var(--transition);
  }
  .btn:hover { border-color: var(--accent-dim); }
  .btn-primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent); color: #0f0f0f; }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

  /* --- Modal --- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: var(--modal-backdrop);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%; max-width: 520px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-weight: 600; font-size: 0.95rem; }
  .modal-close {
    background: none; border: none; color: var(--dim);
    font-size: 1.2rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    padding: 1rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .modal-body label {
    display: flex; flex-direction: column; gap: 0.3rem;
    font-size: 0.8rem; color: var(--dim);
  }
  .modal-body label.inline {
    flex-direction: row; align-items: center; gap: 0.5rem;
  }
  .modal-body input[type="text"],
  .modal-body input[type="url"],
  .modal-body select,
  .modal-body textarea {
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.8rem;
    outline: none;
  }
  .modal-body input:focus, .modal-body textarea:focus {
    border-color: var(--accent-dim);
  }
  .modal-body textarea { resize: vertical; }
  .modal-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.25rem 0;
  }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
  }

  /* --- URL row in link modal --- */
  .url-row {
    display: flex; gap: 0.5rem; align-items: center;
  }
  .url-row input { flex: 1; }
  .url-row .btn-icon { flex-shrink: 0; }

  /* --- Misc --- */
  .empty-state {
    font-size: 0.8rem;
    color: var(--dim);
    text-align: center;
    padding: 1.5rem 1rem;
  }
  .warning-bar {
    background: #332200;
    border: 1px solid var(--sold);
    border-radius: var(--radius);
    color: var(--sold);
    font-size: 0.75rem;
    padding: 0.5rem 1rem;
    margin-bottom: 1rem;
  }
  .group-count {
    font-size: 0.75rem;
    color: var(--dim);
    font-weight: 400;
    margin-left: 0.25rem;
  }
  .search-input:focus-visible,
  .btn:focus-visible,
  .btn-icon:focus-visible,
  a:focus-visible {
    outline: 2px solid var(--accent-dim);
    outline-offset: 2px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header id="header"></header>
<div id="search-wrap"></div>
<main id="groups"></main>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title"></span>
      <button class="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body"></div>
    <div class="modal-footer"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
