version = "1.2.0"

[format]
dedup = true
dedup_inactive_fullscreen = false
delim = " "
client = "{icon}{delim}"
client_active = "<span color='#ff6ac1'>{icon}</span>{delim}"
client_dup = "{icon}{counter_sup}{delim}"
client_dup_fullscreen = "[{icon}]{delim}{icon}{counter_unfocused_sup}"
client_fullscreen = "[{icon}]{delim}"
workspace = "<b><span color='#57c7ff'>{id}:{name}</span></b>{delim}{clients}"
workspace_empty = "<b><span color='#686868'>{id}:{name}</span></b>{delim}{clients}"

[class_active]
DEFAULT = "<span color='#ff6ac1'>{icon}</span>"

[workspaces_name]
1 = "main"
2 = "web"
3 = "code"
4 = "chat"
5 = "media"
6 = "ops"
7 = "files"
8 = "notes"
9 = "misc"
10 = "vertical"

