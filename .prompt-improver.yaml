preamble: |
  Context: Cross-platform dotfiles repo for Manjaro Linux (Hyprland).
  Tech stack: shell scripts, TOML/YAML configs, GLSL shaders, ironbar (TOML).

rules:
  - match: "shader|glsl|spirv"
    prepend: "Kitty/DarkWindow loads GLSL at runtime. No #include support — each .glsl must be self-contained."
  - match: "ironbar|widget|bar"
    prepend: "ironbar uses TOML for layout and CSS for styling."
  - match: "hypr|compositor"
    prepend: "Hyprland compositor on Manjaro Linux. Config at ~/.config/hypr/hyprland.conf."
  - match: "hook|skill|agent"
    prepend: "Claude Code hooks live in .claude/settings.json. Skills in .claude/skills/. Agents in .claude/agents/."

hook:
  skip_score_threshold: 70
  min_word_count: 5

default_task_type: workflow
