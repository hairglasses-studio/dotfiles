# Snazzy-on-black Starship prompt — matches Ghostty rice

palette = "snazzy"

format = """
$directory\
$line_break\
$character"""

right_format = ""

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"

[directory]
style = "bold cyan"
truncation_length = 5
truncation_symbol = "…/"
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = " 󰌾"
read_only_style = "red"

[palettes.snazzy]
cyan    = "#57c7ff"
magenta = "#ff6ac1"
green   = "#5af78e"
yellow  = "#f3f99d"
red     = "#ff5c57"
gray    = "#686868"
lcyan   = "#9aedfe"
fg      = "#f1f1f0"
