# Snazzy-on-black Starship prompt вҖ” matches Ghostty rice
# Full-featured config with contextual modules

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$golang\
$nodejs\
$python\
$rust\
$terraform\
$helm\
$docker_context\
$container\
$kubernetes\
$aws\
$gcloud\
$env_var\
$cmd_duration\
$jobs\
$fill\
$time\
$line_break\
$character"""

right_format = ""

# в”Җв”Җ Prompt в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold #5af78e)"
error_symbol = "[вқҜ](bold #ff5c57)"

[username]
show_always = false
style_user = "#686868"
style_root = "bold #ff5c57"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "#686868"
format = "[@$hostname]($style) "

[directory]
style = "bold #57c7ff"
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"
read_only_style = "#ff5c57"

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = " "
style = "bold #ff6ac1"

[git_commit]
tag_symbol = " у°“№ "
style = "#686868"
commit_hash_length = 7
only_detached = true

[git_state]
style = "bold #f3f99d"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"

[git_metrics]
disabled = false
added_style = "#5af78e"
deleted_style = "#ff5c57"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[git_status]
style = "bold #f3f99d"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
stashed = "вүЎ${count}"
conflicted = "=${count}"

# в”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[package]
symbol = "у°Ҹ— "
style = "#f3f99d"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "bold #9aedfe"

[nodejs]
symbol = " "
style = "bold #5af78e"

[python]
symbol = " "
style = "bold #f3f99d"
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "bold #ff5c57"

[terraform]
symbol = "уұҒў "
style = "bold #9aedfe"
format = "[$symbol$workspace]($style) "

# в”Җв”Җ Cloud / Infra в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[docker_context]
symbol = " "
style = "bold #57c7ff"
only_with_files = true

[kubernetes]
disabled = false
symbol = "уұғҫ "
style = "bold #57c7ff"
format = "[$symbol$context( \\($namespace\\))]($style) "

[aws]
disabled = false
symbol = " "
style = "bold #f3f99d"
format = "[$symbol($profile )(\\($region\\) )]($style)"

[gcloud]
disabled = false
symbol = "уұҮ¶ "
style = "bold #57c7ff"
format = "[$symbol($project )]($style)"

# в”Җв”Җ Status / Meta в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 2_000
style = "#686868"
format = "took [$duration]($style) "
show_notifications = false

[jobs]
symbol = "+"
style = "#f3f99d"
threshold = 1

[fill]
symbol = " "

[time]
disabled = false
style = "#686868"
format = "[$time]($style)"
time_format = "%H:%M"

[helm]
symbol = "вҺҲ "
style = "bold #57c7ff"
format = "[$symbol$version]($style) "

[container]
symbol = "в¬Ў "
style = "#57c7ff"
format = "[$symbol$name]($style) "

[env_var.MCP_SERVER]
symbol = "вҡЎ"
style = "bold #ff6ac1"
format = "[$symbol $env_value]($style) "
variable = "MCP_SERVER"
default = ""

[env_var.VIRTUAL_ENV]
symbol = "рҹҗҚ "
style = "#f3f99d"
format = "[$env_value]($style) "
variable = "VIRTUAL_ENV"
default = ""
