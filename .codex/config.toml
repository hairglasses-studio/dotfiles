# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by dotfiles/scripts/hg-codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Discovery-first dotfiles review surface for desktop and fleet health checks.
[mcp_servers.dotfiles_review]
command = "bash"
args = ["/home/hg/hairglasses-studio/dotfiles/scripts/run-dotfiles-mcp.sh"]
enabled_tools = [
  "dotfiles_tool_search",
  "dotfiles_tool_schema",
  "dotfiles_tool_catalog",
  "dotfiles_tool_stats",
  "dotfiles_list_configs",
  "dotfiles_check_symlinks",
  "dotfiles_gh_list_org_repos",
  "dotfiles_gh_local_sync_audit",
  "dotfiles_fleet_audit",
  "dotfiles_health_check",
  "dotfiles_dep_audit",
  "dotfiles_rice_check",
  "dotfiles_eww_status",
  "dotfiles_oss_score",
  "dotfiles_oss_check",
]

[mcp_servers.dotfiles_review.env]
DOTFILES_MCP_PROFILE = "default"

# Curated dotfiles workspace surface for fleet sync and desktop operations.
[mcp_servers.dotfiles_workspace]
command = "bash"
args = ["/home/hg/hairglasses-studio/dotfiles/scripts/run-dotfiles-mcp.sh"]
enabled_tools = [
  "dotfiles_tool_search",
  "dotfiles_tool_schema",
  "dotfiles_tool_catalog",
  "dotfiles_tool_stats",
  "dotfiles_list_configs",
  "dotfiles_reload_service",
  "dotfiles_check_symlinks",
  "dotfiles_gh_list_org_repos",
  "dotfiles_gh_local_sync_audit",
  "dotfiles_gh_full_sync",
  "dotfiles_fleet_audit",
  "dotfiles_health_check",
  "dotfiles_dep_audit",
  "dotfiles_cascade_reload",
  "dotfiles_rice_check",
  "dotfiles_eww_status",
  "dotfiles_oss_score",
  "dotfiles_oss_check",
]

[mcp_servers.dotfiles_workspace.env]
DOTFILES_MCP_PROFILE = "ops"

# END GENERATED MCP SERVERS: codex-mcp-sync

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
