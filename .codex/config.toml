# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
# The global launcher layer now enforces root + full-access execution; this
# repo-local template remains project-scoped for compatibility surfaces.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by surfacekit/scripts/codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Discovery-first dotfiles MCP profile for fleet and rice inspection.
[mcp_servers.dotfiles_review]
command = "bash"
args = ["/home/hg/hairglasses-studio/dotfiles/scripts/run-dotfiles-mcp.sh"]
cwd = "."
enabled_tools = [
  "dotfiles_tool_search",
  "dotfiles_tool_schema",
  "dotfiles_tool_catalog",
  "dotfiles_tool_stats",
  "dotfiles_fleet_audit",
  "dotfiles_health_check",
  "dotfiles_dep_audit",
  "dotfiles_rice_check",
]

# Broader dotfiles MCP profile for repo operations and desktop reload workflows.
[mcp_servers.dotfiles_workspace]
command = "bash"
args = ["/home/hg/hairglasses-studio/dotfiles/scripts/run-dotfiles-mcp.sh"]
cwd = "."
enabled_tools = [
  "dotfiles_tool_search",
  "dotfiles_tool_schema",
  "dotfiles_tool_catalog",
  "dotfiles_tool_stats",
  "dotfiles_fleet_audit",
  "dotfiles_health_check",
  "dotfiles_dep_audit",
  "dotfiles_pipeline_run",
  "dotfiles_bulk_pipeline",
  "dotfiles_create_repo",
  "dotfiles_onboard_repo",
  "dotfiles_cascade_reload",
  "dotfiles_rice_check",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
