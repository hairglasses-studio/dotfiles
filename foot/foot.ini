# Cyberpunk Snazzy foot terminal config
# Used by dropdown-terminal.sh and Hyprland keybinds

[main]
font=Hack Nerd Font:size=12
bold-text-in-bright=no
pad=4x2
initial-window-size-chars=120x35

[bell]
urgent=yes
notify=yes
visual=yes
visual-style=reverse

[scrollback]
lines=10000
multiplier=3.0

[cursor]
style=beam
blink=yes
beam-thickness=2

[colors]
alpha=0.85
foreground=f1f1f0
background=000000

# Snazzy palette
regular0=1a1a1a
regular1=ff5c57
regular2=5af78e
regular3=f3f99d
regular4=57c7ff
regular5=ff6ac1
regular6=9aedfe
regular7=f1f1f0

bright0=686868
bright1=ff5c57
bright2=5af78e
bright3=f3f99d
bright4=57c7ff
bright5=ff6ac1
bright6=9aedfe
bright7=eff0eb

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
