name: Sync fork with upstream

# This reusable workflow keeps your fork in sync with its upstream
# repository.  It runs twice daily and can also be triggered
# manually.  Replace `{{UPSTREAM_REPOSITORY}}` with the
# `owner/repo` of the upstream project that your fork was
# created from.  Replace `{{TARGET_BRANCH}}` and
# `{{UPSTREAM_BRANCH}}` with the appropriate branch names (for
# example, `main`).

on:
  schedule:
    # Runs twice a day at midnight and noon UTC.  Adjust as
    # needed.
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    # Allows the workflow to be triggered manually from the
    # Actions tab.
    {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      - name: Add upstream remote and fetch
        run: |
          # Add upstream remote if it doesn't already exist
          git remote add upstream https://github.com/{{UPSTREAM_REPOSITORY}}.git || true
          git fetch upstream
      - name: Merge upstream branch
        run: |
          # Check out the branch to sync
          git checkout {{TARGET_BRANCH}}
          # Merge upstream changes using fast‑forward if possible
          git merge --ff-only upstream/{{UPSTREAM_BRANCH}} || true
      - name: Push updates to fork
        run: |
          git push origin {{TARGET_BRANCH}}
