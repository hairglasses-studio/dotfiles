# Cyberpunk Snazzy lock screen
daemonize
ignore-empty-password
show-failed-attempts
font=JetBrainsMono Nerd Font

# Screen
color=000000

# Ring indicator
indicator-radius=120
indicator-thickness=8
inside-color=00000000
ring-color=686868
line-color=00000000

# Typing state — cyan glow
key-hl-color=57c7ff
inside-ver-color=00000000
ring-ver-color=57c7ff
line-ver-color=00000000
text-ver-color=57c7ff

# Wrong password — red flash
inside-wrong-color=00000000
ring-wrong-color=ff5c57
line-wrong-color=00000000
text-wrong-color=ff5c57

# Cleared
inside-clear-color=00000000
ring-clear-color=f3f99d
line-clear-color=00000000
text-clear-color=f3f99d

# Caps lock — magenta
inside-caps-lock-color=00000000
ring-caps-lock-color=ff6ac1
text-caps-lock-color=ff6ac1

# Text
text-color=f1f1f0

# Separator
separator-color=00000000
