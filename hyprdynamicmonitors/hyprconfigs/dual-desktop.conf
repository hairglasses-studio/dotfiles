# 3-monitor layout (updated 2026-04-23): HDMI XEC landscape,
# DP-2 XEC portrait, and Samsung LC49G95T landscape center.
#
#   HDMI-A-1 = XEC ES-G32C1Q, 2560x1440@60,  scale 2, transform 0.
#   DP-2     = XEC ES-G32C1Q, 2560x1440@180, scale 2, transform 3 (270° CCW).
#   DP-3     = Samsung LC49G95T, 2560x1440@60 (DSC fallback), scale 2,
#              transform 0.
#
# Samsung is running its 2560x1440@60 fallback because DSC is not
# negotiating — Samsung EDID on DP-3 does not expose 5120x1440. If DSC
# returns after a clean reboot (availableModes on DP-3 grows to include
# 5120x1440), restore the Samsung line to
# `monitor = DP-3, 5120x1440@239.76, auto, 2` and adjust scale back to 1.
#
# Logical geometry (scale=2 → landscape is 1280x720 logical, portrait 720x1280):
#   HDMI-A-1: x 5316..6596, y 248..968  (landscape, left)
#   DP-3:     x 6596..7876, y 248..968  (landscape, center — Samsung)
#   DP-2:     x 7876..8596, y   0..1280 (portrait, right)
# Edges meet cleanly — no overlap. Previous layout had HDMI at x=5876
# which only worked while HDMI was transform=1 (portrait, 720 wide);
# when HDMI flipped to landscape its right edge extended 560px into
# DP-3. Moved HDMI to 5316 so its right edge lands exactly on DP-3's
# left edge, and aligned y=248 with DP-3 for a clean horizontal row.
monitor = HDMI-A-1, 2560x1440@59.95, 5316x248, 2, transform, 0
monitor = DP-2,     2560x1440@180,   7876x0,   2, transform, 3
monitor = DP-3,     2560x1440@59.95, 6596x248, 2
# No wildcard fallback — it resets scale/transform on every reload.

# split-monitor-workspaces count=5 → HDMI-A-1:1-5, DP-2:6-10, DP-3:11-15.
# HDMI-A-1 and DP-3 use no monitor transform; DP-2 remains portrait.
workspace = 1, layoutopt:orientation:top
workspace = 2, layoutopt:orientation:top
workspace = 3, layoutopt:orientation:top
workspace = 4, layoutopt:orientation:top
workspace = 5, layoutopt:orientation:top
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
workspace = 10, layoutopt:orientation:top
