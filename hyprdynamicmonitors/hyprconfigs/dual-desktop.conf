# Dual desktop layout (current hardware configuration).
# DP-2 = Samsung ultrawide 5120x1440 @ 240Hz, landscape, left side.
# DP-3 = 2560x1440 @ 180Hz, portrait (transform 3), right of DP-2.
# DP-3 position is `auto` so the right-of orientation survives DSC-fallback
# states where DP-2's mode changes (3840x1080 scale=1 vs native 5120x1440
# scale=2). Hyprland places DP-3 adjacent to the last-defined monitor.
monitor = DP-2, 5120x1440@239.76, 4596x271, 2
# DP-3 transform=3 is applied at runtime by hypr-sync-plugin-binds.sh —
# reload/parse path triggers a DRM disconnect that silently drops transform.
monitor = DP-3, preferred, auto, 1
# No wildcard fallback — it overrides the named monitors on every reload.

workspace = 1, layoutopt:orientation:left
workspace = 2, layoutopt:orientation:left
workspace = 3, layoutopt:orientation:left
workspace = 4, layoutopt:orientation:left
workspace = 5, layoutopt:orientation:left
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
workspace = 10, layoutopt:orientation:top
