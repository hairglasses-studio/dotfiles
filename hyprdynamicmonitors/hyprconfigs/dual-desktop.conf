# 3-monitor layout (updated 2026-04-23): two portrait XEC panels
# flanking the Samsung LC49G95T native ultrawide center. All three
# panels run at native pixels (scale=1) — UI density is 1:1 across
# the workstation.
#
#   HDMI-A-1 = XEC ES-G32C1Q, 2560x1440@60,    scale 1, transform 1 (90° CCW).
#   DP-3     = Samsung LC49G95T, 5120x1440@240, scale 1 (DSC native).
#   DP-2     = XEC ES-G32C1Q, 2560x1440@180,   scale 1, transform 3 (270° CCW).
#
# DSC is currently negotiating — Samsung exposes 5120x1440@239.76Hz in
# availableModes. If DSC drops out (Samsung stuck at 0x0 or only the
# 2560x1440 fallback), revert DP-3 to `2560x1440@59.95, 6036x248, 2`,
# bump scale to 2, shift DP-2 left to 7316,0, and pull HDMI's y back
# to 0. See nvidia-wayland.md for the hardware power-cycle DSC
# recovery procedure.
#
# Logical geometry (scale=1 everywhere):
#   HDMI-A-1: x  4596..6036,  y    0..2560 (portrait, 1440x2560)
#   DP-3:     x  6036..11156, y  560..2000 (Samsung, 5120x1440)
#   DP-2:     x 11156..12596, y    0..2560 (portrait, 1440x2560)
# Portraits are taller than Samsung at scale=1 — Samsung anchors
# y=560 to vertically center inside the 2560-tall portraits. Edges
# meet cleanly — no overlap.
monitor = HDMI-A-1, 2560x1440@59.95,   4596x0,   1, transform, 1
monitor = DP-3,     5120x1440@239.76,  6036x560, 1
monitor = DP-2,     2560x1440@180,    11156x0,   1, transform, 3
# No wildcard fallback — it resets scale/transform on every reload.

# split-monitor-workspaces count=5 → HDMI-A-1:1-5, DP-2:6-10, DP-3:11-15.
# HDMI-A-1 + DP-2 are portrait; DP-3 (Samsung center) is landscape native.
workspace = 1, layoutopt:orientation:top
workspace = 2, layoutopt:orientation:top
workspace = 3, layoutopt:orientation:top
workspace = 4, layoutopt:orientation:top
workspace = 5, layoutopt:orientation:top
workspace = 6, layoutopt:orientation:top
workspace = 7, layoutopt:orientation:top
workspace = 8, layoutopt:orientation:top
workspace = 9, layoutopt:orientation:top
workspace = 10, layoutopt:orientation:top
