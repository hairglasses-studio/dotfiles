[pyprland]
plugins = ["scratchpads", "expose"]

[scratchpads.term]
command = "$HOME/.local/bin/kitty-visual-launch --class=scratchpad"
class = "scratchpad"
size = "80% 70%"
animation = "fromTop"

[scratchpads.keybinds]
command = "$HOME/.local/bin/kitty-visual-launch --class=keybinds -o font_size=10 bash -c '$HOME/hairglasses-studio/dotfiles/scripts/hypr-keybinds.sh --md && glow -s $HOME/hairglasses-studio/dotfiles/glow/snazzy.json -p -w 0 $HOME/hairglasses-studio/dotfiles/hyprland/keybinds.md'"
class = "keybinds"
size = "25% 95%"
position = "0% 0%"
animation = "fromLeft"
lazy = true

[scratchpads.volume]
command = "pavucontrol"
class = "pavucontrol"
size = "40% 60%"
animation = "fromRight"

[scratchpads.files]
command = "thunar"
class = "thunar"
size = "60% 60%"
animation = "fromLeft"

[scratchpads.dev-console]
command = "$HOME/.local/bin/kitty-visual-launch --class=dev-console --config $HOME/hairglasses-studio/dotfiles/kitty/dev-console-overrides.conf -e dev-console"
class = "dev-console"
size = "90% 70%"
animation = "fromTop"
lazy = true
