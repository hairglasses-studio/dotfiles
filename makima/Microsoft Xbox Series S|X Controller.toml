# makima — Xbox Series S|X Controller :: Hyprland Desktop
# Steam browser-inspired layout with direct hyprctl dispatch
# Per-app override: com.mitchellh.ghostty.toml (Claude Code mode)
#
# ── Quick reference ──────────────────────────────────────
#   A       = select / click (left mouse)
#   B       = close window (killactive)
#   X       = open terminal (ghostty)
#   Y       = app launcher (wofi)
#   LB/RB   = move window focus left/right
#   LT/RT   = left/right mouse click
#   Start   = wlogout power menu
#   Select  = screenshot → clipboard
#   Guide   = toggle dashboard workspace
#   L3      = shader random
#   R3      = wallpaper next
#   D-Pad   = workspace prev/next (L/R), fullscreen (U), floating (D)
#   L-Stick = mouse cursor
#   R-Stick = scroll

[commands]
# Face buttons — primary actions
BTN_SOUTH = ["hyprctl dispatch focusurgentorlast"]
BTN_EAST = ["hyprctl dispatch killactive"]
BTN_WEST = ["ghostty --gtk-single-instance=false"]
BTN_NORTH = ["wofi --show drun"]

# Bumpers — window focus left/right ($mod+Shift+Left/Right equivalent)
BTN_TL = ["hyprctl dispatch movefocus l"]
BTN_TR = ["hyprctl dispatch movefocus r"]

# Center buttons
BTN_SELECT = ["$DOTFILES_DIR/scripts/gamepad/controller-screenshot.sh"]
BTN_START = ["wlogout -b 5"]
BTN_MODE = ["hyprctl dispatch togglespecialworkspace dashboard"]

# Stick clicks — rice controls
BTN_THUMBL = ["$DOTFILES_DIR/scripts/gamepad/controller-shader-random.sh"]
BTN_THUMBR = ["$DOTFILES_DIR/scripts/gamepad/controller-wallpaper-next.sh"]

# D-Pad — workspace navigation + window state
BTN_DPAD_LEFT = ["hyprctl dispatch workspace e-1"]
BTN_DPAD_RIGHT = ["hyprctl dispatch workspace e+1"]
BTN_DPAD_UP = ["hyprctl dispatch fullscreen 0"]
BTN_DPAD_DOWN = ["hyprctl dispatch togglefloating"]

[remap]
# Triggers — mouse clicks (analog, pressure-sensitive)
ABS_Z = ["BTN_LEFT"]
ABS_RZ = ["BTN_RIGHT"]

[settings]
LSTICK = "cursor"
RSTICK = "scroll"
LSTICK_SENSITIVITY = "6"
LSTICK_DEADZONE = "5"
RSTICK_SENSITIVITY = "6"
RSTICK_DEADZONE = "10"
CURSOR_SPEED = "10"
CURSOR_ACCEL = "0.5"
SCROLL_SPEED = "8"
16_BIT_AXIS = "true"
GRAB_DEVICE = "false"
