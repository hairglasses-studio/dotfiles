# makima — Xbox Series S|X Controller :: Ghostty (Claude Code)
# Auto-activates when Ghostty is focused (per-app Hyprland switching)
# A=Enter (approve), B=Escape, X=/ (slash cmd), Y=y (confirm)

[remap]
BTN_SOUTH = ["KEY_ENTER"]
BTN_EAST = ["KEY_ESC"]
BTN_WEST = ["KEY_SLASH"]
BTN_NORTH = ["KEY_Y"]
BTN_TL = ["KEY_LEFTSHIFT", "KEY_TAB"]
BTN_TR = ["KEY_TAB"]
BTN_START = ["KEY_LEFTCTRL", "KEY_C"]
BTN_SELECT = ["KEY_LEFTCTRL", "KEY_L"]
BTN_DPAD_UP = ["KEY_UP"]
BTN_DPAD_DOWN = ["KEY_DOWN"]
BTN_DPAD_LEFT = ["KEY_LEFT"]
BTN_DPAD_RIGHT = ["KEY_RIGHT"]
ABS_Z = ["BTN_LEFT"]
ABS_RZ = ["BTN_RIGHT"]
