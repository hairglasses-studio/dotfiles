# makima — Xbox Series S|X Controller :: Ghostty (Claude Code)
# Auto-activates when Ghostty is focused (per-app Hyprland switching)
#
# ── Quick reference ──────────────────────────────────────
#   A       = Enter (approve plan / confirm)
#   B       = Escape (cancel / dismiss)
#   X       = / (start slash command)
#   Y       = y (quick "yes" response)
#   LB/RB   = move window focus left/right (same as desktop)
#   LT/RT   = scroll wheel up/down (review session context)
#   L3      = Shift+Tab (toggle plan ↔ bypass permissions)
#   R3      = Tab (completion)
#   D-Pad U = 1 key (accept first option)
#   D-Pad D = 2 key (accept second option)
#   D-Pad L = Up arrow (scroll up / history prev)
#   D-Pad R = Down arrow (scroll down / history next)
#   Select  = Ctrl+- (decrease font size)
#   Start   = Ctrl+= (increase font size)

[remap]
# Face buttons — Claude Code interaction
BTN_SOUTH = ["KEY_ENTER"]
BTN_EAST = ["KEY_ESC"]
BTN_WEST = ["KEY_SLASH"]
BTN_NORTH = ["KEY_Y"]

# Stick clicks
BTN_THUMBL = ["KEY_LEFTSHIFT", "KEY_TAB"]
BTN_THUMBR = ["KEY_TAB"]

# Center buttons — font size control
BTN_SELECT = ["KEY_LEFTCTRL", "KEY_MINUS"]
BTN_START = ["KEY_LEFTCTRL", "KEY_EQUAL"]

# D-Pad — option selection + scrolling
BTN_DPAD_UP = ["KEY_1"]
BTN_DPAD_DOWN = ["KEY_2"]
BTN_DPAD_LEFT = ["KEY_UP"]
BTN_DPAD_RIGHT = ["KEY_DOWN"]

# Triggers — scroll wheel (review session context history)
ABS_Z = ["KEY_PAGEUP"]
ABS_RZ = ["KEY_PAGEDOWN"]

[commands]
# Bumpers — window focus (same behavior as desktop profile)
BTN_TL = ["hyprctl dispatch movefocus l"]
BTN_TR = ["hyprctl dispatch movefocus r"]
