# ═══════════════════════════════════════════════════════════════
# App Override — ralphglasses TUI (dropdown terminal)
# When the dropdown-cyber class window is focused, remap for TUI
# ═══════════════════════════════════════════════════════════════

[[app_override]]
window_class = "dropdown-cyber"
description = "Ralphglasses TUI mode"

# Tab navigation (push buttons 1-5)
[[app_override.mapping]]
input = "midi:note:36"
