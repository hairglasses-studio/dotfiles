# Intech Studio EN16 — Claude Code Fleet Controller
# Layer 1 (Navigation): Push = focus session, Rotate = scroll history
# Layer 2 (Input): Push = send keystroke, Rotate = Up/Down arrows
# App Override: ralphglasses TUI controls when dropdown terminal is focused

[profile]
schema_version = 1
type = "mapping"
device = "Grid"
author = "hairglasses"
description = "EN16 Claude Code fleet controller — 2 layers + ralphglasses override"
tags = ["midi", "en16", "claude-code", "fleet"]

[profile.hardware]
vendor_ids = ["303a"]
product_ids = ["8123"]
brand = "intech"
features = ["encoders", "buttons", "leds"]

[device]
name = "Grid"
type = "midi"
vendor_id = "303a"
product_id = "8123"

[settings]
grab_device = "false"

# ═══════════════════════════════════════════════════════════════
# Layer 1 — Navigation Mode (default)
# Push encoder = focus session N, Rotate = scroll prompt history
# ═══════════════════════════════════════════════════════════════

# ── Row 1: Sessions 1-4 ──────────────────────────────────────

[[mapping]]
input = "midi:note:36"
layer = 1
description = "Focus session 1"
[mapping.output]
type = "command"
exec = ["en16-session-focus.sh", "1"]

[[mapping]]
input = "midi:cc:32"
layer = 1
description = "Scroll history (session 1 area)"
[mapping.output]
type = "command"
exec = ["en16-encoder-key.sh", "{value}", "Down", "Up"]

[[mapping]]
