# Encoder 13 — Workspace navigation
[[mapping]]
input = "midi:note:48"
layer = 1
description = "Workspace overview (hyprexpo)"
[mapping.output]
type = "command"
exec = ["hyprctl", "dispatch", "hyprexpo:expo", "toggle"]

[[mapping]]
input = "midi:cc:44"
layer = 1
description = "Cycle workspace CW/CCW"
[mapping.output]
type = "command"
exec = ["en16-encoder-key.sh", "{value}", "super+Right", "super+Left"]

# Encoder 14 — Reload / Volume
[[mapping]]
input = "midi:note:49"
layer = 1
description = "Reload mapitall profiles"
[mapping.output]
type = "command"
exec = ["mapitall", "reload"]

[[mapping]]
input = "midi:cc:45"
layer = 1
description = "System volume up/down"
[mapping.output]
type = "command"
exec = ["en16-encoder-key.sh", "{value}", "XF86AudioRaiseVolume", "XF86AudioLowerVolume"]

# Encoder 15 — Reserved (movefocus cycle)
[[mapping]]
input = "midi:note:50"
layer = 1
description = "Toggle focused window (urgent or last)"
[mapping.output]
type = "command"
exec = ["hyprctl", "dispatch", "focusurgentorlast"]

[[mapping]]
input = "midi:cc:46"
layer = 1
description = "Cycle window focus left/right"
[mapping.output]
type = "command"
exec = ["en16-encoder-key.sh", "{value}", "super+l", "super+h"]

# Encoder 16 — Layer switch to Input Mode
[[mapping]]
input = "midi:note:51"
layer = 1
description = "Switch to Layer 2 (Input Mode)"
[mapping.output]
type = "layer_switch"
layer = "2"

[[mapping]]
input = "midi:cc:47"
layer = 1
description = "Agent session picker (wofi)"
[mapping.output]
type = "command"
exec = ["en16-encoder-key.sh", "{value}", "super+ctrl+c", "super+ctrl+c"]

