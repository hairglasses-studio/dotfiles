list = { fg = "#${THEME_FG}" }
btn_yes = { bg = "#${THEME_TERTIARY}", fg = "#${THEME_BG}" }
btn_no = { bg = "#${THEME_DANGER}", fg = "#${THEME_BG}" }
btn_labels = { fg = "#${THEME_FG}" }

[completion]
border = { fg = "#${THEME_PRIMARY}" }
active = { bg = "#${THEME_SURFACE}", fg = "#${THEME_FG}", bold = true }
inactive = { fg = "#${THEME_MUTED}" }

[tasks]
border = { fg = "#${THEME_PRIMARY}" }
title = { fg = "#${THEME_PRIMARY}" }
hovered = { fg = "#${THEME_SECONDARY}", underline = true }

[help]
