marker_selected = { fg = "#${THEME_TERTIARY}", bg = "#${THEME_TERTIARY}" }
marker_copied = { fg = "#${THEME_WARNING}", bg = "#${THEME_WARNING}" }
marker_cut = { fg = "#${THEME_DANGER}", bg = "#${THEME_DANGER}" }
tab_active = { fg = "#${THEME_BG}", bg = "#${THEME_PRIMARY}" }
tab_inactive = { fg = "#${THEME_MUTED}", bg = "#${THEME_SURFACE}" }
count_selected = { fg = "#${THEME_BG}", bg = "#${THEME_TERTIARY}" }
count_copied = { fg = "#${THEME_BG}", bg = "#${THEME_WARNING}" }
count_cut = { fg = "#${THEME_BG}", bg = "#${THEME_DANGER}" }
border_symbol = "│"
