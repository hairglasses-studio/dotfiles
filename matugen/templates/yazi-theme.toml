run = { fg = "#${THEME_SECONDARY}" }
desc = { fg = "#${THEME_MUTED}" }
hovered = { bg = "#${THEME_SURFACE}", bold = true }
footer = { fg = "#${THEME_MUTED}" }

[filetype]
rules = [
    { mime = "image/*", fg = "#${THEME_SECONDARY}" },
    { mime = "video/*", fg = "#${THEME_WARNING}" },
    { mime = "audio/*", fg = "#${THEME_TERTIARY}" },
    { name = "*.go", fg = "#${THEME_PRIMARY}" },
    { name = "*.rs", fg = "#${THEME_DANGER}" },
    { name = "*.py", fg = "#${THEME_WARNING}" },
    { name = "*.js", fg = "#${THEME_WARNING}" },
    { name = "*.ts", fg = "#${THEME_PRIMARY}" },
    { name = "*.md", fg = "#${THEME_FG}" },
    { name = "*.yml", fg = "#${THEME_SECONDARY}" },
    { name = "*.yaml", fg = "#${THEME_SECONDARY}" },
    { name = "*.toml", fg = "#${THEME_SECONDARY}" },
    { name = "*.json", fg = "#${THEME_WARNING}" },
    { name = "*.sh", fg = "#${THEME_TERTIARY}" },
    { name = "*Dockerfile*", fg = "#${THEME_PRIMARY}" },
    { name = "*Makefile*", fg = "#${THEME_TERTIARY}" },
]
