progress_label = { fg = "#${THEME_FG}", bold = true }
progress_normal = { fg = "#${THEME_PRIMARY}", bg = "#${THEME_SURFACE}" }
progress_error = { fg = "#${THEME_DANGER}", bg = "#${THEME_SURFACE}" }
permissions_t = { fg = "#${THEME_PRIMARY}" }
permissions_r = { fg = "#${THEME_WARNING}" }
permissions_w = { fg = "#${THEME_DANGER}" }
permissions_x = { fg = "#${THEME_TERTIARY}" }
permissions_s = { fg = "#${THEME_MUTED}" }

[input]
border = { fg = "#${THEME_PRIMARY}" }
title = { fg = "#${THEME_PRIMARY}" }
value = { fg = "#${THEME_FG}" }
selected = { reversed = true }

[pick]
border = { fg = "#${THEME_PRIMARY}" }
active = { fg = "#${THEME_SECONDARY}", bold = true }
inactive = { fg = "#${THEME_MUTED}" }

[confirm]
border = { fg = "#${THEME_PRIMARY}" }
