# Yazi theme — Hairglasses Neon
# Generated by palette-propagate.sh — source: theme/palette.env

[manager]
cwd = { fg = "#${THEME_PRIMARY}", bold = true }
hovered = { bg = "#${THEME_SURFACE}", fg = "#${THEME_FG}", bold = true }
preview_hovered = { underline = true }
find_keyword = { fg = "#${THEME_WARNING}", bold = true, italic = true }
