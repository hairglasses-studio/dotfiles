# cava — Cyberpunk Neon audio visualizer
# Generated by palette-propagate.sh — do not edit by hand.
# Source palette: theme/palette.env

[general]
framerate = 60
autosens = 1
sensitivity = 150
bars = 0
bar_width = 2
bar_spacing = 1
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[input]
method = pulse
source = auto
; macOS: change method to portaudio
; method = portaudio
; source = auto

[output]
method = ncurses
channels = stereo
mono_option = average

[color]
background = default
foreground = default
gradient = 1
gradient_count = 8
gradient_color_1 = '#${THEME_PRIMARY}'
gradient_color_2 = '#7cf7ff'
gradient_color_3 = '#${THEME_TERTIARY}'
gradient_color_4 = '#7dffc8'
gradient_color_5 = '#${THEME_WARNING}'
gradient_color_6 = '#${THEME_SECONDARY}'
gradient_color_7 = '#ff84e8'
gradient_color_8 = '#${THEME_DANGER}'

[smoothing]
integral = 77
monstercat = 1
waves = 0
gravity = 100
ignore = 0
noise_reduction = 77

[eq]
1 = 1
2 = 1
3 = 1
4 = 1
5 = 1
