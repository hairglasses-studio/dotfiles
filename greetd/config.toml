[terminal]
vt = "next"

[default_session]
command = "env HOME=/var/lib/greetd XDG_CACHE_HOME=/var/lib/greetd/.cache XDG_DATA_HOME=/var/lib/greetd/.local/share tuigreet --user-menu --user-menu-min-uid 1000 --remember --remember-session --cmd Hyprland --time --issue --asterisks"
user = "greeter"
service = "greetd-greeter"
