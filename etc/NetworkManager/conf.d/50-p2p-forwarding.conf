[connection-p2p-forwarding]
# Keep NetworkManager from toggling IPv4 forwarding on the transient Wi-Fi P2P
# helper interface. This host intentionally keeps global forwarding enabled for
# container/network stacks, and the default per-device update can warn during
# boot while the p2p helper interface is still coming up.
match-device=interface-name:p2p-dev-*
stop-match=yes
ipv4.forwarding=3
